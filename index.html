<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ڕۆژی لەدایکبوونت پیرۆز بیت | Dle Mn</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      font-family: 'Arial', 'Segoe UI', sans-serif;
    }
    
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    .container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #message-box {
      background: rgba(10, 10, 30, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 2.5rem 2rem;
      max-width: 700px;
      width: 85%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 80px rgba(180, 130, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 2rem;
      pointer-events: auto;
    }

    #typed-text {
      color: #f3e8ff;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      line-height: 2.1;
      font-weight: 500;
      min-height: 4em;
      text-shadow: 0 0 20px #c084fc, 0 0 40px #a855f7;
      letter-spacing: 1px;
      direction: rtl;
      unicode-bidi: embed;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .signature {
      margin-top: 1.8rem;
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      font-weight: bold;
      color: #facc15;
      text-shadow: 0 0 25px #eab308, 0 0 50px #fbbf24, 0 0 70px #f59e0b;
      background: linear-gradient(to right, #fde047, #fbbf24, #eab308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      direction: rtl;
      unicode-bidi: embed;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: auto;
    }

    .signature.show {
      opacity: 1;
    }

    /* دوگمەی دەستپێکردن */
    .start-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: white;
      border: none;
      padding: 20px 50px;
      font-size: 24px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 40px rgba(168, 85, 247, 0.6);
      transition: all 0.3s ease;
      font-weight: bold;
      letter-spacing: 2px;
      pointer-events: auto;
      animation: pulse 2s infinite;
    }

    .start-button:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 60px rgba(168, 85, 247, 0.9);
      background: linear-gradient(135deg, #8b5cf6, #c084fc);
    }

    .start-button.hidden {
      display: none;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
      50% { box-shadow: 0 0 50px rgba(168, 85, 247, 0.9), 0 0 80px rgba(251, 191, 36, 0.4); }
      100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.6); }
    }

    .music-note {
      position: absolute;
      bottom: 25px;
      right: 25px;
      z-index: 20;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c4b5fd;
      font-size: 24px;
      border: 1px solid rgba(255,255,255,0.25);
      pointer-events: auto;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
      transition: 0.3s;
    }
    
    .music-note:hover {
      background: rgba(80, 40, 120, 0.8);
      color: #facc15;
    }

    .volume-indicator {
      position: absolute;
      bottom: 25px;
      left: 25px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      padding: 8px 16px;
      border-radius: 30px;
      color: #4ade80;
      font-size: 14px;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>

  <!-- دوگمەی دەستپێکردن -->
  <button id="startButton" class="start-button">🎵 کلیک بکە بۆ دەستپێکردن 🎂</button>

  <div class="container">
    <div id="message-box">
      <div id="typed-text"></div>
      <div id="final-name" class="signature">Dle Mn</div>
    </div>
  </div>

  <div class="volume-indicator" id="volumeStatus">🔇 چاوەڕوانی کلیک...</div>
  
  <div class="music-note" id="musicToggle" title="کلیک بکە بۆ دووبارە ڕێکخستنەوە">♪</div>

  <div id="youtube-player" style="position:absolute; width:0; height:0; opacity:0; pointer-events:none;"></div>

  <script>
    // ===================  ئەستێرەکان ===================
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let width, height;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initStars(140);
    }

    function initStars(count) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2.3 + 0.7,
          brightness: Math.random() * 0.7 + 0.3,
          speed: Math.random() * 0.4 + 0.15,
          angle: Math.random() * Math.PI * 2
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      const gradient = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width*0.7);
      gradient.addColorStop(0, '#1e1b4b');
      gradient.addColorStop(0.7, '#0f0f23');
      gradient.addColorStop(1, '#050510');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      stars.forEach(star => {
        star.x += Math.cos(star.angle) * star.speed * 0.15;
        star.y += Math.sin(star.angle) * star.speed * 0.15;
        
        if (star.x < -10) star.x = width + 10;
        if (star.x > width + 10) star.x = -10;
        if (star.y < -10) star.y = height + 10;
        if (star.y > height + 10) star.y = -10;
        
        const flicker = 0.5 + Math.sin(Date.now() * 0.002 + star.x) * 0.3 + Math.cos(Date.now() * 0.003 + star.y) * 0.3;
        const alpha = Math.min(1, star.brightness * flicker + 0.3);
        
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 240, 255, ${alpha})`;
        ctx.shadowColor = '#d8b4fe';
        ctx.shadowBlur = star.radius * 3.5;
        ctx.fill();
        
        if (star.radius > 1.6) {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius * 0.8, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha*1.2})`;
          ctx.shadowBlur = star.radius * 7;
          ctx.fill();
        }
      });
      ctx.shadowBlur = 0;
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawStars();

    // ===================  یوتوب ===================
    const YOUTUBE_VIDEO_ID = '3i5T2mkQsHQ';
    const START_TIME_SECONDS = 80;
    
    let player;
    let playerReady = false;
    let audioStarted = false;
    
    function loadYouTubeAPI() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }
    
    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('youtube-player', {
        videoId: YOUTUBE_VIDEO_ID,
        playerVars: {
          autoplay: 0,
          controls: 0,
          modestbranding: 1,
          loop: 0,
          rel: 0,
          showinfo: 0,
          start: START_TIME_SECONDS,
          mute: 0,
          enablejsapi: 1,
          playsinline: 1,
          volume: 100
        },
        events: {
          'onReady': onPlayerReady,
          'onStateChange': onPlayerStateChange,
          'onError': onPlayerError
        }
      });
    };
    
    function onPlayerReady(event) {
      playerReady = true;
      console.log('✅ پلەیەر ئامادەیە');
      document.getElementById('volumeStatus').textContent = '✅ ئامادەیە - کلیک بکە';
    }
    
    function onPlayerStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        console.log('🎵 گۆرانی دەست پێکرد');
        document.getElementById('volumeStatus').textContent = '🔊 دەنگ کارایە';
      }
    }
    
    function onPlayerError(error) {
      console.warn('⚠️ هەڵە:', error.data);
      document.getElementById('volumeStatus').textContent = '❌ هەڵە - دووبارە هەوڵبدە';
    }
    
    function startAudio() {
      if (!audioStarted && player && playerReady) {
        console.log('🔊 هەوڵی دەستپێکردنی دەنگ...');
        
        // ڕێکخستنەوەی ڤۆڵیوم و ئەنمیوت
        player.unMute();
        player.setVolume(100);
        player.seekTo(START_TIME_SECONDS);
        
        // دەستپێکردنی پەخش
        setTimeout(() => {
          player.playVideo();
        }, 200);
        
        audioStarted = true;
        document.getElementById('volumeStatus').textContent = '🔊 گۆرانی بەردەوامە...';
        document.getElementById('startButton').classList.add('hidden');
        
        // دەستپێکردنی نوسینی پەیام
        startTyping();
      }
    }
    
    // دوگمەی سەرەکی
    document.getElementById('startButton').addEventListener('click', function(e) {
      e.preventDefault();
      startAudio();
    });
    
    // دوگمەی میوزیک
    document.getElementById('musicToggle').addEventListener('click', () => {
      if (!audioStarted) {
        startAudio();
      } else if (player && playerReady) {
        if (player.getPlayerState() === YT.PlayerState.PLAYING) {
          player.pauseVideo();
          document.getElementById('volumeStatus').textContent = '🔇 وەستا';
        } else {
          player.playVideo();
          document.getElementById('volumeStatus').textContent = '🔊 گۆرانی بەردەوامە...';
        }
      }
    });
    
    // کلیک لە هەر شوێنێکی پەڕەکە
    document.body.addEventListener('click', function(e) {
      if (!audioStarted && e.target.id !== 'startButton') {
        startAudio();
      }
    });
    
    document.body.addEventListener('touchstart', function(e) {
      if (!audioStarted && e.target.id !== 'startButton') {
        startAudio();
      }
    });
    
    loadYouTubeAPI();

    // ===================  پەیامی پیت بە پیت ===================
    const messageText = "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من یارەبی تەمەنت هەزار ساڵ بینتن خوا لۆمن و ئازیزانت بێلیت دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا لۆت ببیتە خۆشی دڵخۆشی میوانی هەمیشەیت بیت رۆحی من باشە کە هەیت لەژیانم دوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت خوشکە گەورەی من";
    
    const typedTextElement = document.getElementById('typed-text');
    const finalNameElement = document.getElementById('final-name');
    let charIndex = 0;
    let typingInterval;
    let typingStarted = false;
    
    function startTyping() {
      if (typingStarted) return;
      typingStarted = true;
      
      typedTextElement.textContent = '';
      charIndex = 0;
      finalNameElement.classList.remove('show');
      
      if (typingInterval) clearInterval(typingInterval);
      
      typingInterval = setInterval(() => {
        if (charIndex < messageText.length) {
          typedTextElement.textContent += messageText.charAt(charIndex);
          charIndex++;
        } else {
          clearInterval(typingInterval);
          setTimeout(() => {
            finalNameElement.classList.add('show');
          }, 400);
        }
      }, 90);
    }
    
    console.log('🌟 ئامادەیە - کلیک لە دوگمەکە بکە بۆ دەستپێکردن');
  </script>
</body>
</html>
