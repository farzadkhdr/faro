<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لە دایک بوونت پیرۆز بیت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', sans-serif;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* ئاسمانی تاریک */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
            z-index: 0;
        }

        /* ئەستێرەکان */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* کۆنتێنەری پەیام */
        .message-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(138, 43, 226, 0.5);
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.3);
        }

        .message-line {
            color: #ffffff;
            font-size: 22px;
            line-height: 2;
            min-height: 30px;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* ناوی گەورە */
        .big-name {
            font-size: 48px;
            font-weight: 900;
            margin-top: 30px;
            color: #ff6b9d;
            text-shadow: 0 0 30px #ff6b9d, 0 0 60px #ff6b9d;
            animation: pulse 1.5s ease-in-out infinite;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* دوگمەی دەستپێکردن */
        .start-btn {
            margin-top: 30px;
            padding: 18px 45px;
            font-size: 20px;
            background: linear-gradient(135deg, #8a2be2, #ff6b9d);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5);
            animation: btnGlow 2s ease-in-out infinite;
        }

        @keyframes btnGlow {
            0%, 100% { box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5); }
            50% { box-shadow: 0 5px 40px rgba(255, 107, 157, 0.8); }
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* دڵەکان */
        .heart {
            position: fixed;
            font-size: 20px;
            animation: floatUp 4s ease-in forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* Loading spinner */
        .loading {
            display: none;
            margin-top: 15px;
            color: #ff6b9d;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- ئاسمان -->
    <div class="sky"></div>
    <div class="stars-container" id="stars"></div>

    <!-- یوتیوب پلەیەر -->
    <div id="youtubePlayer" style="position:fixed; top:-200px; left:-200px; width:1px; height:1px; opacity:0; pointer-events:none; z-index:-999;"></div>

    <!-- کۆنتێنەر -->
    <div class="message-container" id="messageContainer">
        <div id="linesContainer"></div>
        <div class="big-name" id="bigName">Dle Mn</div>
        <div>
            <button class="start-btn" id="startBtn" onclick="startEverything()">
                🎵 کرتە بکە بۆ دەستپێکردن 🎂
            </button>
            <div class="loading" id="loading">⏳ تکایە چاوەڕێ بکە... گۆرانی بار دەکرێت...</div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        // هێڵەکانی پەیام
        const messageLines = [
            "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من",
            "یارەبی تەمەنت هەزار ساڵ بینتن",
            "خوا لۆمن و ئازیزانت بێلیت",
            "دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا",
            "لۆت ببیتە خۆشی دڵخۆشی",
            "میوانی هەمیشەیت بیت رۆحی من",
            "باشە کە هەیت لەژیانم",
            "دوبارەو هەزار جار",
            "ڕۆژی لەدایک بوونت پیرۆز بیت",
            "خوشکە گەورەی من"
        ];

        let player;
        let animationStarted = false;

        // یوتیوب API ئامادە بوو
        function onYouTubeIframeAPIReady() {
            console.log('✅ YouTube API ئامادەیە');
            
            player = new YT.Player('youtubePlayer', {
                videoId: '3i5T2mkQsHQ',
                playerVars: {
                    autoplay: 0,        // ئۆتۆپلەی ناکەین تا بەکارهێنەر کرتە دەکات
                    controls: 0,
                    disablekb: 1,
                    enablejsapi: 1,
                    fs: 0,
                    iv_load_policy: 3,
                    modestbranding: 1,
                    rel: 0,
                    showinfo: 0,
                    start: 80,          // 1:20 = 80 چرکە
                    mute: 0,
                    loop: 1,
                    playlist: '3i5T2mkQsHQ',
                    playsinline: 1,
                    origin: window.location.origin
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange,
                    'onError': onPlayerError
                }
            });
        }

        function onPlayerReady(event) {
            console.log('✅ پلەیەر ئامادەیە');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = '🎵 کرتە بکە بۆ دەستپێکردن 🎂';
        }

        function onPlayerStateChange(event) {
            console.log('🎬 State changed:', event.data);
            
            // YT.PlayerState.PLAYING = 1
            if (event.data === 1) {
                console.log('🎵 گۆرانی دەست پێ کرد!');
                if (!animationStarted) {
                    animationStarted = true;
                    document.getElementById('loading').style.display = 'none';
                    startAnimation();
                }
            }
            
            // YT.PlayerState.ENDED = 0
            if (event.data === 0) {
                console.log('🔄 دووبارە دەست پێ دەکات');
                player.seekTo(80);
                player.playVideo();
            }
        }

        function onPlayerError(event) {
            console.error('❌ هەڵە لە پلەیەر:', event);
            document.getElementById('loading').textContent = '❌ هەڵە! تکایە دووبارە هەوڵ بدە';
        }

        // دروستکردنی ئەستێرەکان
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                container.appendChild(star);
            }
        }

        // دروستکردنی دڵ
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            const emojis = ['❤️', '💕', '💖', '💗', '💝', '💜', '✨', '🌟'];
            heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 90 + '%';
            heart.style.bottom = '0px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        // نوسینی پیت بە پیت
        function typeLine(line, element, callback) {
            element.textContent = '';
            const chars = [...line];
            let index = 0;
            
            const interval = setInterval(() => {
                if (index < chars.length) {
                    element.textContent += chars[index];
                    index++;
                } else {
                    clearInterval(interval);
                    if (callback) callback();
                }
            }, 80);
        }

        // نوسینی هەموو هێڵەکان
        function typeAllLines(lines, container, bigNameElement) {
            let lineIndex = 0;
            
            function typeNext() {
                if (lineIndex < lines.length) {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'message-line';
                    container.appendChild(lineDiv);
                    
                    createHeart();
                    
                    typeLine(lines[lineIndex], lineDiv, () => {
                        lineIndex++;
                        setTimeout(typeNext, 300);
                    });
                } else {
                    // نیشاندانی ناوی گەورە
                    bigNameElement.style.display = 'block';
                    
                    for (let i = 0; i < 15; i++) {
                        setTimeout(createHeart, i * 200);
                    }
                }
            }
            
            typeNext();
        }

        // ئەنیمەیشنی پەیام
        function startAnimation() {
            const linesContainer = document.getElementById('linesContainer');
            linesContainer.innerHTML = '';
            
            setTimeout(() => {
                typeAllLines(messageLines, linesContainer, document.getElementById('bigName'));
            }, 300);
            
            setInterval(createHeart, 1500);
        }

        // دەستپێکردنی هەموو شتێک
        function startEverything() {
            const btn = document.getElementById('startBtn');
            const loading = document.getElementById('loading');
            
            btn.style.display = 'none';
            loading.style.display = 'block';
            loading.textContent = '⏳ گۆرانی بار دەکرێت...';
            
            if (player && player.playVideo) {
                player.unMute();
                player.setVolume(70);
                player.seekTo(80);  // 1:20
                player.playVideo();
                console.log('▶️ playVideo() called');
            } else {
                loading.textContent = '❌ پلەیەر ئامادە نییە، تکایە پەڕەکە ڕیفڕێش بکە';
                console.error('Player not ready');
            }
        }

        // ئامادەکردنی پەڕە
        window.onload = function() {
            createStars();
            document.getElementById('loading').style.display = 'block';
            document.getElementById('loading').textContent = '⏳ یوتیوب بار دەکرێت...';
            document.getElementById('startBtn').style.display = 'none';
            
            console.log('📄 پەڕە بار بوو');
            console.log('🎯 ڤیدیۆ: 3i5T2mkQsHQ');
            console.log('⏱️ دەستپێک: 1:20 (80s)');
        };
    </script>
</body>
</html>
