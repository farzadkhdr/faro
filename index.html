<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لە دایک بوونت پیرۆز بیت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', sans-serif;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ئاسمانی تاریک */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 70%);
            z-index: 0;
        }

        /* ئەستێرەکان */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* کۆنتێنەری پەیام */
        .message-container {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid rgba(138, 43, 226, 0.5);
            border-radius: 20px;
            padding: 40px;
            max-width: 650px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.3);
        }

        .message-line {
            color: #ffffff;
            font-size: 22px;
            line-height: 2;
            min-height: 30px;
            margin: 5px 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* ناوی گەورە */
        .big-name {
            font-size: 48px;
            font-weight: 900;
            margin-top: 30px;
            color: #ff6b9d;
            text-shadow: 0 0 30px #ff6b9d, 0 0 60px #ff6b9d;
            animation: pulse 1.5s ease-in-out infinite;
            display: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* دوگمەی دەستپێکردن */
        .start-btn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #8a2be2, #ff6b9d);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.5);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(138, 43, 226, 0.7);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* دڵەکان */
        .heart {
            position: fixed;
            font-size: 20px;
            animation: floatUp 4s ease-in forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- ئاسمان -->
    <div class="sky"></div>
    <div class="stars-container" id="stars"></div>

    <!-- یوتیوب - بە شێوەیەکی شاراوە -->
    <iframe id="youtubeAudio" 
            style="position:fixed; top:-100px; left:-100px; width:1px; height:1px; opacity:0; pointer-events:none; z-index:-999;"
            allow="autoplay"
            frameborder="0">
    </iframe>

    <!-- کۆنتێنەر -->
    <div class="message-container" id="messageContainer">
        <div id="linesContainer"></div>
        <div class="big-name" id="bigName">Dle Mn</div>
        <button class="start-btn" id="startBtn" onclick="startEverything()">
            🎵 کرتە بکە بۆ دەستپێکردن 🎂
        </button>
    </div>

    <script>
        // هێڵەکانی پەیام
        const messageLines = [
            "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من",
            "یارەبی تەمەنت هەزار ساڵ بینتن",
            "خوا لۆمن و ئازیزانت بێلیت",
            "دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا",
            "لۆت ببیتە خۆشی دڵخۆشی",
            "میوانی هەمیشەیت بیت رۆحی من",
            "باشە کە هەیت لەژیانم",
            "دوبارەو هەزار جار",
            "ڕۆژی لەدایک بوونت پیرۆز بیت",
            "خوشکە گەورەی من"
        ];

        let animationStarted = false;

        // دروستکردنی ئەستێرەکان
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                container.appendChild(star);
            }
        }

        // دروستکردنی دڵ
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.textContent = ['❤️', '💕', '💖', '💗', '💝'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 90 + '%';
            heart.style.bottom = '0px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        // نوسینی پیت بە پیت
        function typeLine(line, element, callback) {
            element.textContent = '';
            const chars = line.split('');
            let index = 0;
            
            const interval = setInterval(() => {
                if (index < chars.length) {
                    element.textContent += chars[index];
                    index++;
                } else {
                    clearInterval(interval);
                    if (callback) callback();
                }
            }, 80); // 80ms بۆ هەر پیتێک
        }

        // نوسینی هەموو هێڵەکان یەک لە دوای یەک
        function typeAllLines(lines, container, bigNameElement) {
            let lineIndex = 0;
            
            function typeNext() {
                if (lineIndex < lines.length) {
                    // دروستکردنی دیڤی نوێ بۆ هەر هێڵێک
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'message-line';
                    container.appendChild(lineDiv);
                    
                    // دروستکردنی دڵ لە کاتی نوسین
                    createHeart();
                    
                    typeLine(lines[lineIndex], lineDiv, () => {
                        lineIndex++;
                        setTimeout(typeNext, 300); // 300ms پشوو لە نێوان هێڵەکان
                    });
                } else {
                    // نیشاندانی ناوی گەورە
                    bigNameElement.style.display = 'block';
                    bigNameElement.style.animation = 'none';
                    bigNameElement.offsetHeight; // ڕیفڕێش
                    bigNameElement.style.animation = 'pulse 1.5s ease-in-out infinite';
                    
                    // چەند دڵێکی زیادە
                    for (let i = 0; i < 10; i++) {
                        setTimeout(createHeart, i * 200);
                    }
                }
            }
            
            typeNext();
        }

        // دەستپێکردنی گۆرانی
        function startMusic() {
            const iframe = document.getElementById('youtubeAudio');
            // YouTube embed link with start time at 1:20 (80 seconds)
            iframe.src = 'https://www.youtube.com/embed/3i5T2mkQsHQ?autoplay=1&start=80&controls=0&disablekb=1&enablejsapi=1&iv_load_policy=3&modestbranding=1&rel=0&showinfo=0&mute=0&loop=1&playlist=3i5T2mkQsHQ';
            
            console.log('🎵 گۆرانی دەست پێ کرد لە 1:20');
        }

        // دەستپێکردنی هەموو شتێک
        function startEverything() {
            if (animationStarted) return;
            animationStarted = true;
            
            // شاردنەوەی دوگمە
            document.getElementById('startBtn').style.display = 'none';
            
            // پاککردنەوەی کۆنتێنەر
            const linesContainer = document.getElementById('linesContainer');
            linesContainer.innerHTML = '';
            
            // دەستپێکردنی گۆرانی
            startMusic();
            
            // دەستپێکردنی نوسینی پەیام
            setTimeout(() => {
                typeAllLines(messageLines, linesContainer, document.getElementById('bigName'));
            }, 500);
            
            // دروستکردنی دڵ بەردەوام
            setInterval(createHeart, 1500);
        }

        // ئامادەکردنی پەڕە
        window.onload = function() {
            createStars();
            console.log('✅ ئامادەیە - تکایە کرتە بکە بۆ دەستپێکردن');
        };
    </script>
</body>
</html>
