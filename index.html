<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لەدایک بوونت پیرۆز بیت</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&family=Scheherazade+New:wght@400;700&family=Amiri:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Scheherazade New', 'Noto Naskh Arabic', 'Amiri', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0.7;
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.8);
                box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.8);
            }
        }

        .moon {
            position: fixed;
            top: 8%;
            right: 12%;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1;
            animation: moonGlow 4s ease-in-out infinite;
        }

        .moon-circle {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 35% 35%, #fff8dc, #f5e6b8);
            border-radius: 50%;
            box-shadow: 0 0 60px 25px rgba(255, 248, 220, 0.6), 0 0 120px 50px rgba(255, 248, 220, 0.3);
            position: relative;
        }

        .moon-crater1 {
            position: absolute;
            width: 25px;
            height: 25px;
            background: rgba(210, 180, 140, 0.5);
            border-radius: 50%;
            top: 30%;
            left: 40%;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3);
        }
        .moon-crater2 {
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(210, 180, 140, 0.5);
            border-radius: 50%;
            top: 55%;
            left: 25%;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3);
        }
        .moon-crater3 {
            position: absolute;
            width: 18px;
            height: 18px;
            background: rgba(210, 180, 140, 0.5);
            border-radius: 50%;
            top: 45%;
            left: 60%;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        @keyframes moonGlow {
            0%,
            100% {
                filter: drop-shadow(0 0 30px rgba(255, 248, 220, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(255, 248, 220, 1));
            }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 45px 55px;
            max-width: 800px;
            width: 90%;
            text-align: center;
            border: 2px solid rgba(255, 248, 220, 0.3);
            box-shadow: 0 0 60px rgba(255, 248, 220, 0.2), inset 0 0 30px rgba(0, 0, 0, 0.8);
            animation: fadeInUp 2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            color: #fff8dc;
            font-size: 1.8rem;
            line-height: 2.8;
            text-shadow: 0 0 15px rgba(255, 248, 220, 0.5);
            word-spacing: 8px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            font-family: 'Scheherazade New', 'Noto Naskh Arabic', serif;
            font-weight: 400;
        }

        .message span {
            display: inline-block;
            animation: wordAppear 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
            margin: 0 4px;
        }

        @keyframes wordAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signature {
            color: #ffd700;
            font-size: 4rem;
            font-weight: 700;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5);
            letter-spacing: 10px;
            margin-top: 30px;
            animation: glowPulse 2s ease-in-out infinite;
            font-family: 'Scheherazade New', 'Noto Naskh Arabic', serif;
        }

        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 50px rgba(255, 215, 0, 1), 0 0 100px rgba(255, 215, 0, 0.9), 0 0 150px rgba(255, 215, 0, 0.6);
            }
        }

        .falling-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px white;
            animation: shoot var(--travel-duration) linear infinite;
            animation-delay: var(--travel-delay);
            opacity: 0;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent);
            right: 100%;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-25deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            15% {
                transform: translate(-400px, 250px) rotate(-25deg);
                opacity: 0;
            }
            100% {
                transform: translate(-400px, 250px) rotate(-25deg);
                opacity: 0;
            }
        }

        .audio-control {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px 20px;
            border: 1px solid rgba(255, 248, 220, 0.3);
            color: #fff8dc;
            font-family: 'Scheherazade New', serif;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .audio-control:hover {
            background: rgba(0, 0, 0, 0.8);
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .play-icon {
            font-size: 1.5rem;
        }

        @media (max-width: 600px) {
            .content-wrapper {
                padding: 30px 25px;
            }
            .message {
                font-size: 1.3rem;
                line-height: 2.5;
                word-spacing: 5px;
            }
            .signature {
                font-size: 3rem;
            }
            .moon {
                width: 80px;
                height: 80px;
                top: 4%;
                right: 8%;
            }
            .moon-circle {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>

    <div class="moon">
        <div class="moon-circle">
            <div class="moon-crater1"></div>
            <div class="moon-crater2"></div>
            <div class="moon-crater3"></div>
        </div>
    </div>

    <div class="falling-stars" id="fallingStars"></div>

    <!-- Audio element for better control -->
    <audio id="bgMusic" loop preload="auto">
        <source src="https://docs.google.com/uc?export=download&id=1YEbM1Gj5Z1SXvB4x2klGZMfhH3j5Fh1m" type="audio/mpeg">
    </audio>

    <!-- Button to start music -->
    <div class="audio-control" id="musicControl" onclick="toggleMusic()">
        <span class="play-icon">🎵</span>
        <span id="musicText">کلیک بکە بۆ گۆرانی</span>
    </div>

    <div class="content-wrapper" id="contentBox">
        <div class="message" id="birthdayMessage"></div>
        <div class="signature">Dle Mn</div>
    </div>

    <script>
        // Create twinkling stars
        function createStars() {
            const container = document.getElementById('starsContainer');
            const starCount = 250;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                star.style.setProperty('--delay', `${Math.random() * 5}s`);
                container.appendChild(star);
            }
        }

        // Create shooting stars
        function createShootingStars() {
            const container = document.getElementById('fallingStars');
            for (let i = 0; i < 5; i++) {
                const shooter = document.createElement('div');
                shooter.classList.add('shooting-star');
                shooter.style.left = `${Math.random() * 80 + 10}%`;
                shooter.style.top = `${Math.random() * 40}%`;
                shooter.style.setProperty('--travel-duration', `${Math.random() * 3 + 4}s`);
                shooter.style.setProperty('--travel-delay', `${Math.random() * 8}s`);
                container.appendChild(shooter);
            }
        }

        // Animate message word by word
        function animateMessage() {
            const messageDiv = document.getElementById('birthdayMessage');
            const fullMessage = `ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من
یارەبی تەمەنت هەزار ساڵ بینتن
خوا لۆمن و ئازیزانت بێلیت
دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا لۆت ببیتە خۆشی
دڵخۆشی میوانی هەمیشەیت بیت ڕۆحی من
باشە کە هەیت لەژیانم
دوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت
خوشکە گەورەی من`;

            const words = fullMessage.split(/\s+/);
            messageDiv.innerHTML = '';

            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.textContent = word;
                span.style.animationDelay = `${index * 0.25}s`;
                messageDiv.appendChild(span);
                
                // Add space after each word
                if (index < words.length - 1) {
                    messageDiv.appendChild(document.createTextNode(' '));
                }
            });
        }

        // YouTube player setup for background music
        let player;
        let musicStarted = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtubePlayer', {
                height: '0',
                width: '0',
                videoId: '3i5T2mkQsHQ',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': 80, // Start at 1:20
                    'loop': 1,
                    'playlist': '3i5T2mkQsHQ',
                    'mute': 0
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            console.log('YouTube player ready');
            // Auto-start music after a short delay
            setTimeout(() => {
                if (!musicStarted) {
                    startMusic();
                }
            }, 1000);
        }

        function onPlayerStateChange(event) {
            if (event.data === YT.PlayerState.PLAYING) {
                musicStarted = true;
                updateMusicButton(true);
            } else if (event.data === YT.PlayerState.PAUSED) {
                updateMusicButton(false);
            }
        }

        function startMusic() {
            if (player && player.playVideo) {
                player.seekTo(80); // Ensure start at 1:20
                player.playVideo();
                player.unMute();
                musicStarted = true;
                updateMusicButton(true);
            }
        }

        function toggleMusic() {
            if (!musicStarted) {
                startMusic();
            } else if (player) {
                if (player.getPlayerState() === YT.PlayerState.PLAYING) {
                    player.pauseVideo();
                } else {
                    player.playVideo();
                }
            }
        }

        function updateMusicButton(isPlaying) {
            const musicText = document.getElementById('musicText');
            const playIcon = document.querySelector('.play-icon');
            if (isPlaying) {
                musicText.textContent = 'گۆرانی بڕە';
                playIcon.textContent = '⏸️';
            } else {
                musicText.textContent = 'گۆرانی لێبە';
                playIcon.textContent = '🎵';
            }
        }

        // Initialize everything
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
            createShootingStars();
            animateMessage();
            
            // Load YouTube API
            const tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
            
            // Fallback: Try to start music on first user interaction
            document.body.addEventListener('click', function initMusic() {
                if (!musicStarted && player) {
                    startMusic();
                }
                document.body.removeEventListener('click', initMusic);
            }, { once: true });
        });

        // Make onYouTubeIframeAPIReady global
        window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    </script>

    <!-- Hidden YouTube player -->
    <div id="youtubePlayer" style="position: fixed; top: -1000px; left: -1000px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></div>

</body>
</html>
