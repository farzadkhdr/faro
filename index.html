<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لە دایک بوونت پیرۆز بیت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', 'Segoe UI', sans-serif;
            background: #0a0a1a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ئاسمانی تاریک */
        .sky {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a3e 0%, #050510 100%);
            z-index: 0;
        }

        /* ئەستێرەکان */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
            animation-delay: var(--delay);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.8); box-shadow: 0 0 10px white; }
        }

        /* کۆنتێنەری سەرەکی */
        .main-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-box {
            background: rgba(10, 10, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(138, 43, 226, 0.4);
            border-radius: 24px;
            padding: 50px 45px;
            max-width: 700px;
            width: 90%;
            text-align: center;
            box-shadow: 
                0 0 80px rgba(138, 43, 226, 0.2),
                0 0 150px rgba(75, 0, 130, 0.1);
        }

        .line {
            color: #ffffff;
            font-size: 24px;
            line-height: 2.2;
            min-height: 35px;
            margin: 8px 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .line.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ناوی گەورە */
        .final-name {
            font-size: 55px;
            font-weight: 900;
            margin-top: 35px;
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #ff9a56);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px #ff6b9d);
            animation: nameGlow 2s ease-in-out infinite;
            opacity: 0;
            transform: scale(0.3);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .final-name.visible {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes nameGlow {
            0%, 100% { filter: drop-shadow(0 0 30px #ff6b9d); }
            50% { filter: drop-shadow(0 0 60px #ff6b9d) drop-shadow(0 0 100px #c44dff); }
        }

        /* دوگمەی دەستپێکردن */
        .play-btn {
            padding: 20px 55px;
            font-size: 22px;
            background: linear-gradient(135deg, #8a2be2, #ff6b9d);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
            box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4);
            animation: btnPulse 2s infinite;
            transition: 0.3s;
        }

        .play-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(138, 43, 226, 0.6);
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(138, 43, 226, 0.4); }
            50% { box-shadow: 0 10px 50px rgba(255, 107, 157, 0.7); }
        }

        /* دڵە فڕیوەکان */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 5;
            animation: flyUp 5s ease-out forwards;
        }

        @keyframes flyUp {
            0% {
                transform: translateY(0) scale(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-110vh) scale(1.8) rotate(180deg);
                opacity: 0;
            }
        }

        /* یوتیوب پلەیەر - شاراوە */
        #audioContainer {
            position: fixed;
            bottom: 10px;
            right: 10px;
            width: 300px;
            height: 200px;
            z-index: 999;
            opacity: 0.01;
            pointer-events: auto;
        }

        #audioContainer iframe {
            width: 100%;
            height: 100%;
        }

        /* ئیندیکەیتەری دەنگ */
        .sound-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            color: #00ff88;
            font-size: 14px;
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 20px;
        }

        .message-hint {
            color: rgba(255,255,255,0.6);
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- ئاسمان -->
    <div class="sky"></div>
    <div class="stars-container" id="stars"></div>

    <!-- پلەیەری یوتیوب -->
    <div id="audioContainer"></div>
    <div class="sound-indicator" id="soundIndicator">🔊 گۆرانی بەردەوامە...</div>

    <!-- کۆنتێنەری سەرەکی -->
    <div class="main-wrapper">
        <div class="message-box" id="messageBox">
            <div id="contentArea">
                <button class="play-btn" id="playBtn" onclick="startExperience()">
                    🎂 کرتە بکە بۆ دەستپێکردن 🎵
                </button>
                <p class="message-hint">دوای کرتە، گۆرانیەکە دەست پێ دەکات و پەیامەکە دەنووسرێت</p>
            </div>
            <div class="final-name" id="finalName">Dle Mn</div>
        </div>
    </div>

    <script>
        const messageLines = [
            "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من",
            "یارەبی تەمەنت هەزار ساڵ بینتن",
            "خوا لۆمن و ئازیزانت بێلیت",
            "دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا",
            "لۆت ببیتە خۆشی دڵخۆشی",
            "میوانی هەمیشەیت بیت رۆحی من",
            "باشە کە هەیت لەژیانم",
            "دوبارەو هەزار جار",
            "ڕۆژی لەدایک بوونت پیرۆز بیت",
            "خوشکە گەورەی من"
        ];

        let isPlaying = false;

        // دروستکردنی ئەستێرەکان
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--delay', Math.random() * 5 + 's');
                
                if (Math.random() < 0.1) {
                    star.style.background = '#ffccff';
                    star.style.boxShadow = '0 0 8px #ffccff';
                }
                
                container.appendChild(star);
            }
        }

        // دروستکردنی دڵ
        function spawnHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            const emojis = ['❤️', '💕', '💖', '💗', '💝', '💜', '✨', '🌟', '💙', '🩷'];
            heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 90 + '%';
            heart.style.bottom = '0px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        // نووسینی هێڵەکان
        async function displayMessages() {
            const messageBox = document.getElementById('messageBox');
            const contentArea = document.getElementById('contentArea');
            const finalName = document.getElementById('finalName');
            
            // پاککردنەوەی ناوەڕۆکی پێشوو
            contentArea.innerHTML = '';
            
            // دروستکردنی هێڵەکان
            const lineElements = messageLines.map(() => {
                const div = document.createElement('div');
                div.className = 'line';
                contentArea.appendChild(div);
                return div;
            });

            // نووسینی هەر هێڵێک
            for (let i = 0; i < messageLines.length; i++) {
                const lineEl = lineElements[i];
                lineEl.classList.add('show');
                
                // پیت بە پیت نووسین
                const chars = [...messageLines[i]];
                lineEl.textContent = '';
                
                for (let j = 0; j < chars.length; j++) {
                    await sleep(80);
                    lineEl.textContent += chars[j];
                }
                
                // دروستکردنی دڵ دوای هەر هێڵێک
                for (let k = 0; k < 3; k++) {
                    setTimeout(spawnHeart, k * 200);
                }
                
                await sleep(500);
            }

            // نیشاندانی ناوی گەورە
            await sleep(300);
            finalName.classList.add('visible');
            
            // دڵی زیاتر بۆ ناوەکە
            for (let i = 0; i < 15; i++) {
                setTimeout(spawnHeart, i * 150);
            }
        }

        // یارمەتیدەری خەو
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // دەستپێکردنی گۆرانی
        function startMusic() {
            const container = document.getElementById('audioContainer');
            
            // ID ی ڤیدیۆکە
            const videoId = 'RPKTPGuij-Q';
            
            // دروستکردنی ئیفرەیم - لە سەرەتاوە دەست پێ دەکات
            container.innerHTML = `
                <iframe 
                    width="300" 
                    height="200" 
                    src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&rel=0&loop=1&playlist=${videoId}&mute=0&volume=100"
                    frameborder="0"
                    allow="autoplay; encrypted-media"
                    allowfullscreen>
                </iframe>
            `;
            
            document.getElementById('soundIndicator').style.display = 'block';
            console.log('🎵 گۆرانی لە سەرەتاوە دەست پێ کرد');
        }

        // دەستپێکردنی هەموو ئەزموونەکە
        async function startExperience() {
            if (isPlaying) return;
            isPlaying = true;
            
            // شاردنەوەی دوگمە
            const playBtn = document.getElementById('playBtn');
            if (playBtn) playBtn.style.display = 'none';
            
            // شاردنەوەی ڕێنمایی
            const hint = document.querySelector('.message-hint');
            if (hint) hint.style.display = 'none';
            
            // دەستپێکردنی گۆرانی
            startMusic();
            
            // کەمێک چاوەڕوانی بۆ دەستپێکردنی گۆرانی
            await sleep(1000);
            
            // دەستپێکردنی نووسینی پەیام
            displayMessages();
            
            // دروستکردنی دڵ بەردەوام
            setInterval(spawnHeart, 2000);
        }

        // دەستپێکردن
        window.onload = function() {
            createStars();
            console.log('✅ ئامادەیە');
            console.log('📝 پەیام: 10 هێڵ');
            console.log('🎵 گۆرانی: RPKTPGuij-Q لە سەرەتاوە');
            console.log('👤 ناو: Dle Mn');
        };
    </script>
</body>
</html>
