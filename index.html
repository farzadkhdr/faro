<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لە دایک بوونت پیرۆز بیت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ئاسمانی ئەستێرەدار */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        .shooting-star {
            position: absolute;
            width: 3px;
            height: 80px;
            background: linear-gradient(180deg, white, transparent);
            animation: shoot 3s infinite;
            opacity: 0;
        }

        @keyframes shoot {
            0% { 
                opacity: 1;
                transform: translateX(0) translateY(0) rotate(-45deg);
            }
            5% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateX(-300px) translateY(300px) rotate(-45deg);
            }
        }

        /* مۆن */
        .moon {
            position: fixed;
            top: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 30% 30%, #fff8dc, #ffd700);
            border-radius: 50%;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5),
                        0 0 100px rgba(255, 215, 0, 0.3),
                        0 0 150px rgba(255, 215, 0, 0.1);
            z-index: 0;
            animation: moonGlow 3s ease-in-out infinite alternate;
        }

        @keyframes moonGlow {
            from { box-shadow: 0 0 50px rgba(255, 215, 0, 0.5), 0 0 100px rgba(255, 215, 0, 0.3); }
            to { box-shadow: 0 0 80px rgba(255, 215, 0, 0.8), 0 0 150px rgba(255, 215, 0, 0.5), 0 0 200px rgba(255, 215, 0, 0.3); }
        }

        /* کۆنتێنەری سەرەکی */
        .main-container {
            position: relative;
            z-index: 1;
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        .message-box {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.3),
                        0 0 100px rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .typing-text {
            color: #FFD700;
            font-size: 2rem;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8),
                         0 0 20px rgba(255, 215, 0, 0.5),
                         0 0 40px rgba(255, 215, 0, 0.3);
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
            animation: glow 2s ease-in-out infinite alternate;
            text-align: center;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 20px rgba(255, 215, 0, 0.5), 0 0 40px rgba(255, 215, 0, 0.3); }
            to { text-shadow: 0 0 20px rgba(255, 215, 0, 1), 0 0 40px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.5); }
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 2rem;
            background: #FFD700;
            animation: blink 0.8s infinite;
            vertical-align: middle;
            margin-right: 5px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .name-reveal {
            color: #FF6B6B;
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            margin-top: 30px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 1s ease;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8),
                         0 0 40px rgba(255, 107, 107, 0.5),
                         0 0 60px rgba(255, 107, 107, 0.3);
        }

        .name-reveal.show {
            opacity: 1;
            transform: scale(1);
            animation: nameGlow 1.5s ease-in-out infinite alternate;
        }

        @keyframes nameGlow {
            from { 
                text-shadow: 0 0 20px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 107, 107, 0.5);
                transform: scale(1);
            }
            to { 
                text-shadow: 0 0 40px rgba(255, 107, 107, 1), 0 0 80px rgba(255, 107, 107, 0.8), 0 0 120px rgba(255, 107, 107, 0.5);
                transform: scale(1.1);
            }
        }

        .hearts {
            position: fixed;
            top: -50px;
            font-size: 2rem;
            animation: fall linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        .start-button {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 30px;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(255, 215, 0, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 30px rgba(255, 215, 0, 0.5); }
        }

        .start-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.9);
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,215,0,0.5);
            border-radius: 30px;
            padding: 10px 20px;
            display: none;
        }

        .music-btn {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            color: #000;
            font-weight: bold;
            margin: 0 5px;
        }

        .music-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <!-- مانگ -->
    <div class="moon"></div>
    
    <!-- ئاسمانی ئەستێرەدار -->
    <div class="stars-container" id="starsContainer"></div>

    <!-- یوتیوب پلەیەری شاراوە -->
    <iframe id="youtubePlayer" 
            style="position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none;" 
            allow="autoplay" 
            frameborder="0">
    </iframe>

    <!-- کۆنتێنەری سەرەکی -->
    <div class="main-container">
        <div class="message-box">
            <div class="typing-text" id="typingText">
                <span id="typedMessage"></span><span class="cursor" id="cursor"></span>
            </div>
        </div>
        <div class="name-reveal" id="nameReveal">Dle Mn</div>
        <button class="start-button" id="startButton" onclick="startEverything()">✨ دەست پێ بکە ✨</button>
    </div>

    <!-- کۆنترۆڵی موزیک -->
    <div class="music-control" id="musicControl">
        <button class="music-btn" onclick="toggleMusic()">🔊 ڕاگرتن/دەستپێکردن</button>
        <button class="music-btn" onclick="changeVolume()">🎵 گۆڕینی دەنگ</button>
    </div>

    <script>
        // دروستکردنی ئەستێرەکان
        function createStars() {
            const container = document.getElementById('starsContainer');
            const starCount = 300;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
                container.appendChild(star);
            }

            // ئەستێرەی ڕەشەبا
            for (let i = 0; i < 5; i++) {
                const shootingStar = document.createElement('div');
                shootingStar.className = 'shooting-star';
                shootingStar.style.left = Math.random() * 80 + '%';
                shootingStar.style.top = Math.random() * 50 + '%';
                shootingStar.style.animationDelay = (Math.random() * 5 + i * 2) + 's';
                container.appendChild(shootingStar);
            }
        }

        // دڵەکان
        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'hearts';
                heart.innerHTML = ['❤️', '💕', '💖', '✨', '🌟'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 5 + 3) + 's';
                heart.style.fontSize = (Math.random() * 1.5 + 0.8) + 'rem';
                document.body.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 8000);
            }, 500);
        }

        // پەیامەکە
        const message = "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من\nیارەبی تەمەنت هەزار ساڵ بینتن\nخوا لۆمن و ئازیزانت بێلیت\nدلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا\nلۆت ببیتە خۆشی دڵخۆشی\nمیوانی هەمیشەیت بیت رۆحی من\nباشە کە هەیت لەژیانم\nدوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت\nخوشکە گەورەی من";

        let charIndex = 0;
        let typingInterval;
        let isPlaying = false;

        // نمایشی پیت بە پیت
        function typeMessage() {
            const typedMessage = document.getElementById('typedMessage');
            const cursor = document.getElementById('cursor');
            typedMessage.textContent = '';
            charIndex = 0;
            
            typingInterval = setInterval(() => {
                if (charIndex < message.length) {
                    typedMessage.textContent += message.charAt(charIndex);
                    charIndex++;
                } else {
                    clearInterval(typingInterval);
                    cursor.style.display = 'none';
                    // نیشاندانی ناوی گەورە
                    setTimeout(() => {
                        document.getElementById('nameReveal').classList.add('show');
                    }, 500);
                }
            }, 100);
        }

        // دروستکردنی یوتیوب URL بە start=80 (واتا 1:20)
        function startEverything() {
            document.getElementById('startButton').style.display = 'none';
            
            // دروستکردنی ئەمبێدی یوتیوب بە ئۆتۆپلەی
            const videoId = '3i5T2mkQsHQ';
            const startTime = 80; // 1:20 = 80 چرکە
            
            // بەکارهێنانی embed بە شێوەیەک کە ڕێگە بە ئۆتۆپلەی بدات
            const youtubeUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&start=${startTime}&loop=1&playlist=${videoId}&controls=0&modestbranding=1&rel=0&showinfo=0&enablejsapi=1`;
            
            const player = document.getElementById('youtubePlayer');
            player.src = youtubeUrl;
            
            // نیشاندانی کۆنترۆڵی موزیک
            document.getElementById('musicControl').style.display = 'block';
            
            // کەمێک بوەستە پاشان دەست بە نووسین بکە
            setTimeout(() => {
                typeMessage();
            }, 1000);
        }

        // کۆنترۆڵی موزیک
        function toggleMusic() {
            const player = document.getElementById('youtubePlayer');
            if (isPlaying) {
                // ڕاگرتنی موزیک - ئەمە تەنها بە IFrame API کاردەکات
                player.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                isPlaying = false;
            } else {
                player.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                isPlaying = true;
            }
        }

        function changeVolume() {
            const player = document.getElementById('youtubePlayer');
            player.contentWindow.postMessage('{"event":"command","func":"setVolume","args":[50]}', '*');
        }

        // دەستپێکردنی هەموو شتێک
        window.onload = function() {
            createStars();
            createHearts();
        };

        // گوێگرتن لە پەیامەکانی یوتیوب
        window.addEventListener('message', function(event) {
            if (event.origin !== 'https://www.youtube.com') return;
            try {
                const data = JSON.parse(event.data);
                if (data.event === 'onStateChange' && data.info === 1) {
                    isPlaying = true;
                }
            } catch(e) {}
        });
    </script>
</body>
</html>
