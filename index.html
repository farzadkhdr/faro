<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لە دایک بوونت پیرۆز بیت</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* ئاسمانی ئەستێرەدار */
        #starsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* کۆنتێنەری سەرەکی */
        .main-container {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 90%;
            max-width: 800px;
            animation: fadeIn 2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-box {
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.2),
                        0 0 120px rgba(255, 215, 0, 0.1),
                        inset 0 0 30px rgba(255, 215, 0, 0.05);
            backdrop-filter: blur(15px);
        }

        .typing-text {
            color: #FFD700;
            font-size: 1.8rem;
            line-height: 2;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.8),
                         0 0 30px rgba(255, 215, 0, 0.5),
                         0 0 50px rgba(255, 215, 0, 0.3);
            min-height: 100px;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: center;
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 15px rgba(255, 215, 0, 0.8), 0 0 30px rgba(255, 215, 0, 0.5), 0 0 50px rgba(255, 215, 0, 0.3); }
            to { text-shadow: 0 0 25px rgba(255, 215, 0, 1), 0 0 50px rgba(255, 215, 0, 0.8), 0 0 80px rgba(255, 215, 0, 0.5); }
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 1.8rem;
            background: #FFD700;
            animation: blink 0.7s infinite;
            vertical-align: middle;
            margin-right: 5px;
            box-shadow: 0 0 10px #FFD700;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .name-reveal {
            color: #FF6B6B;
            font-size: 4.5rem;
            font-weight: bold;
            text-align: center;
            margin-top: 35px;
            opacity: 0;
            transform: scale(0.3);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.8),
                         0 0 60px rgba(255, 107, 107, 0.5),
                         0 0 90px rgba(255, 107, 107, 0.3);
            letter-spacing: 5px;
        }

        .name-reveal.show {
            opacity: 1;
            transform: scale(1);
            animation: nameGlow 2s ease-in-out infinite alternate;
        }

        @keyframes nameGlow {
            from { 
                text-shadow: 0 0 30px rgba(255, 107, 107, 0.8), 0 0 60px rgba(255, 107, 107, 0.5), 0 0 90px rgba(255, 107, 107, 0.3);
                transform: scale(1);
            }
            to { 
                text-shadow: 0 0 50px rgba(255, 107, 107, 1), 0 0 100px rgba(255, 107, 107, 0.8), 0 0 150px rgba(255, 107, 107, 0.5);
                transform: scale(1.05);
            }
        }

        /* دڵی ڕۆیشتوو */
        .floating-hearts {
            position: fixed;
            pointer-events: none;
            z-index: 1;
        }

        .heart-particle {
            position: fixed;
            font-size: 1.5rem;
            animation: floatUp 6s linear forwards;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { 
                transform: translateY(100vh) scale(0) rotate(0deg); 
                opacity: 1; 
            }
            50% { 
                opacity: 0.8; 
            }
            100% { 
                transform: translateY(-100px) scale(1.5) rotate(360deg); 
                opacity: 0; 
            }
        }
    </style>
</head>
<body>
    <!-- کانڤاسی ئەستێرەکان -->
    <canvas id="starsCanvas"></canvas>

    <!-- کۆنتێنەری سەرەکی -->
    <div class="main-container">
        <div class="message-box">
            <div class="typing-text" id="typingText">
                <span id="typedMessage"></span><span class="cursor" id="cursor"></span>
            </div>
        </div>
        <div class="name-reveal" id="nameReveal">✨ Dle Mn ✨</div>
    </div>

    <!-- یوتیوب پلەیەری شاراوە -->
    <div id="playerContainer" style="position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></div>

    <script>
        // ========== ئاسمانی ئەستێرەدار بە Canvas ==========
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const stars = [];
        const shootingStars = [];
        const starCount = 400;

        // دروستکردنی ئەستێرەکان
        for (let i = 0; i < starCount; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2.5 + 0.5,
                opacity: Math.random(),
                speed: Math.random() * 0.02 + 0.005,
                maxOpacity: Math.random() * 0.7 + 0.3,
                minOpacity: Math.random() * 0.2
            });
        }

        // دروستکردنی ئەستێرەی ڕەشەبا
        function createShootingStar() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.5,
                length: Math.random() * 80 + 40,
                speed: Math.random() * 10 + 5,
                opacity: 1,
                life: 1
            };
        }

        for (let i = 0; i < 3; i++) {
            shootingStars.push(createShootingStar());
            shootingStars[i].life = Math.random();
        }

        // ئەنیمەیشنی ئەستێرەکان
        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // رسم ئەستێرە ئاساییەکان
            stars.forEach(star => {
                star.opacity += star.speed;
                if (star.opacity >= star.maxOpacity || star.opacity <= star.minOpacity) {
                    star.speed = -star.speed;
                }
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
                
                // گڵۆپە بۆ ئەستێرە گەورەکان
                if (star.radius > 1.5) {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.radius * 3, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 200, ${star.opacity * 0.3})`;
                    ctx.fill();
                }
            });
            
            // رسم ئەستێرە ڕەشەباکان
            shootingStars.forEach((star, index) => {
                if (star.life <= 0) {
                    shootingStars[index] = createShootingStar();
                    shootingStars[index].life = 1;
                }
                
                star.x -= star.speed;
                star.y += star.speed * 0.7;
                star.life -= 0.005;
                
                const gradient = ctx.createLinearGradient(
                    star.x, star.y,
                    star.x + star.length, star.y - star.length * 0.7
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${star.opacity})`);
                gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                
                ctx.beginPath();
                ctx.moveTo(star.x, star.y);
                ctx.lineTo(star.x + star.length, star.y - star.length * 0.7);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            
            requestAnimationFrame(animateStars);
        }

        animateStars();

        // ڕێکخستنەوەی قەبارە
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ========== دڵەکان ==========
        function createFloatingHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.textContent = ['❤️', '💕', '💖', '✨', '💫', '🌟', '💝'][Math.floor(Math.random() * 7)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.bottom = '-50px';
                heart.style.fontSize = (Math.random() * 2 + 1) + 'rem';
                heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                document.body.appendChild(heart);
                
                setTimeout(() => heart.remove(), 6000);
            }, 400);
        }

        // ========== پەیامی پیت بە پیت ==========
        const message = "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من\nیارەبی تەمەنت هەزار ساڵ بینتن\nخوا لۆمن و ئازیزانت بێلیت\nدلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا\nلۆت ببیتە خۆشی دڵخۆشی\nمیوانی هەمیشەیت بیت رۆحی من\nباشە کە هەیت لەژیانم\nدوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت\nخوشکە گەورەی من";

        function typeMessage() {
            const typedMessage = document.getElementById('typedMessage');
            const cursor = document.getElementById('cursor');
            let charIndex = 0;
            typedMessage.textContent = '';
            
            const interval = setInterval(() => {
                if (charIndex < message.length) {
                    typedMessage.textContent += message.charAt(charIndex);
                    charIndex++;
                } else {
                    clearInterval(interval);
                    cursor.style.display = 'none';
                    // نیشاندانی ناوی گەورە
                    setTimeout(() => {
                        document.getElementById('nameReveal').classList.add('show');
                    }, 600);
                }
            }, 80);
        }

        // ========== یوتیوب پلەیەر ==========
        function loadYouTubePlayer() {
            // دروستکردنی ئایفرەیم بە شێوەی داینامیک
            const playerDiv = document.getElementById('playerContainer');
            const iframe = document.createElement('iframe');
            iframe.width = '1';
            iframe.height = '1';
            iframe.src = 'https://www.youtube.com/embed/3i5T2mkQsHQ?autoplay=1&start=80&loop=1&playlist=3i5T2mkQsHQ&controls=0&modestbranding=1&rel=0&showinfo=0&mute=0&enablejsapi=1';
            iframe.allow = 'autoplay; encrypted-media';
            iframe.allowFullscreen = false;
            iframe.style.border = 'none';
            iframe.id = 'youtubeFrame';
            
            playerDiv.appendChild(iframe);
            
            console.log('🎵 گۆرانیەکە بە سەرکەوتوویی دەستی پێکرد!');
        }

        // ========== دەستپێکردنی خۆکار ==========
        function startEverythingAutomatically() {
            // 1. دڵەکان دەست پێدەکەن
            createFloatingHearts();
            
            // 2. گۆرانیەکە دەست پێدەکات (دوای 1 چرکە)
            setTimeout(() => {
                loadYouTubePlayer();
            }, 1000);
            
            // 3. پەیامەکە دەست بە نووسین دەکات (دوای 2 چرکە)
            setTimeout(() => {
                typeMessage();
            }, 2500);
        }

        // ========== هەموو شتێک خۆکارانە دەست پێدەکات ==========
        window.addEventListener('load', () => {
            // کەمێک بوەستە بۆ ئەوەی هەموو شتێک ئامادە بێت
            setTimeout(() => {
                startEverythingAutomatically();
            }, 500);
        });

        // پاککردنەوە
        window.addEventListener('beforeunload', () => {
            const iframe = document.getElementById('youtubeFrame');
            if (iframe) {
                iframe.src = '';
            }
        });
    </script>
</body>
</html>
