<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 ڕۆژی لەدایکبوونت پیرۆز - Dle Mn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0a0f1e 0%, #03060c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Vazir', Tahoma, sans-serif;
            padding: 20px;
            position: relative;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1);}
            100% { opacity: 1; transform: scale(1.3);}
        }
        .card {
            position: relative;
            z-index: 10;
            max-width: 800px;
            width: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem;
            border: 1px solid rgba(255,215,0,0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 {
            color: #ffdd99;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 8px #ff9900;
        }
        .message-box {
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            padding: 2rem 1.2rem;
            margin: 20px 0;
            min-height: 350px;
            border-left: 4px solid #ffaa44;
            border-right: 4px solid #ffaa44;
        }
        .message-text {
            font-size: 1.3rem;
            line-height: 2rem;
            color: #fff5e6;
            text-shadow: 0 0 5px #ff884d;
            direction: rtl;
            text-align: center;
            font-weight: 500;
            word-break: break-word;
        }
        .signature {
            margin-top: 28px;
            font-size: 2rem;
            font-weight: bold;
            color: #ffcc77;
            text-shadow: 0 0 12px #ff4400;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .signature.show { opacity: 1; }
        button {
            background: linear-gradient(135deg, #ffaa33, #ff7700);
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            margin: 8px;
            cursor: pointer;
            transition: 0.2s;
            color: #2c1a00;
        }
        button:hover { transform: scale(1.02); background: #ffaa44; }
        .status {
            margin: 12px auto;
            background: #000000aa;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #ddd;
        }
        audio {
            margin-top: 18px;
            width: 100%;
            border-radius: 60px;
        }
        .file-input {
            margin: 15px auto;
            background: #222;
            padding: 8px;
            border-radius: 40px;
            color: #ffcc77;
            font-size: 0.8rem;
        }
        input[type="file"] {
            background: #ffaa33;
            border: none;
            padding: 6px 12px;
            border-radius: 30px;
            margin-top: 5px;
        }
        @media (max-width: 550px) {
            .message-text { font-size: 1rem; line-height: 1.5rem; }
            .signature { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="stars" id="starsContainer"></div>
<div class="card">
    <h1>🌟 ڕۆژی لەدایکبوونت پیرۆز بێت 🌟</h1>
    <div class="message-box">
        <div class="message-text" id="typingMessage"></div>
        <div class="signature" id="signatureDle">✨ Dle Mn ✨</div>
    </div>
    
    <div class="file-input">
        📁 تکایە فایلی گۆرانی (MP3) کە لە یوتیوبەوە دابگرتووە دیاری بکە:<br>
        <input type="file" id="songFile" accept="audio/mp3,audio/mpeg">
    </div>
    
    <audio id="birthdaySong" preload="auto" controls style="display:none;"></audio>
    
    <div class="control-group">
        <button id="startBtn">🎵 دەستپێکردن (گۆرانی+پەیام)</button>
        <button id="resetBtn">🔄 دووبارە پەیام</button>
    </div>
    <div class="status" id="infoStatus">📀 فایلی گۆرانی MP3 هەڵبژێرە، ئینجا کلیک لە دەستپێکردن بکە</div>
    <div style="font-size:11px; margin-top: 10px; color:#aaa;">💡 گۆرانی لە ۱:۲۰ دەست پێ دەکات • پەیام پیت بە پیت هۆڵ دەبێت</div>
</div>

<script>
    const fullMessage = "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من یارەبی تەمەنت هەزار ساڵ بینتن خوا لۆمن و ئازیزانت بێلیت دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا لۆت ببیتە خۆشی دڵخۆشی میوانی هەمیشەیت بیت رۆحی من باشە کە هەیت لەژیانم دوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت خوشکە گەورەی من";
    
    let typedDiv = document.getElementById("typingMessage");
    let signatureEl = document.getElementById("signatureDle");
    let currentIdx = 0;
    let intervalId = null;
    let audio = document.getElementById("birthdaySong");
    let selectedSongBlob = null;
    
    function stopTyping() {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
    }
    
    function startTyping(reset = true) {
        if (reset) {
            stopTyping();
            typedDiv.innerHTML = "";
            currentIdx = 0;
            signatureEl.classList.remove("show");
        }
        if (intervalId) return;
        
        intervalId = setInterval(() => {
            if (currentIdx < fullMessage.length) {
                typedDiv.innerHTML += fullMessage[currentIdx];
                currentIdx++;
            } else {
                clearInterval(intervalId);
                intervalId = null;
                signatureEl.classList.add("show");
                document.getElementById("infoStatus").innerHTML = "💖 پەیام تەواو بوو + Dle Mn 💖";
            }
        }, 85);
    }
    
    // دەستپێکردنی گۆرانی لە 80 چرکە (1:20)
    function playSongFrom80() {
        if (!selectedSongBlob) {
            document.getElementById("infoStatus").innerHTML = "⚠️ تکایە یەکەمجار فایلی MP3 هەڵبژێرە!";
            return false;
        }
        if (audio.readyState >= 2) {
            audio.currentTime = 80;
            audio.play().catch(e => {
                console.log("Autoplay blocked:", e);
                document.getElementById("infoStatus").innerHTML = "🔊 کلیک لە دوگمەی play بکە لەسەر پلێیەرەکە";
            });
            return true;
        } else {
            audio.addEventListener('canplay', () => {
                audio.currentTime = 80;
                audio.play().catch(e=>console.log(e));
            }, { once: true });
            return true;
        }
    }
    
    // هەڵبژاردنی فایلی دەنگ
    document.getElementById("songFile").addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (file && file.type.includes("audio")) {
            selectedSongBlob = URL.createObjectURL(file);
            audio.src = selectedSongBlob;
            audio.style.display = "block";
            document.getElementById("infoStatus").innerHTML = "✅ گۆرانی بارکرا! ئێستا کلیک لە دەستپێکردن بکە.";
        } else {
            alert("تکایە فایلێکی MP3 ی دروست هەڵبژێرە");
        }
    });
    
    // دەستپێکردنی هەموو شتێک
    document.getElementById("startBtn").addEventListener("click", () => {
        if (!selectedSongBlob) {
            document.getElementById("infoStatus").innerHTML = "❌ یەکەمجار فایلی گۆرانی MP3 هەڵبژێرە!";
            return;
        }
        // Reset message if needed
        if (typedDiv.innerHTML.length === fullMessage.length || currentIdx >= fullMessage.length) {
            typedDiv.innerHTML = "";
            currentIdx = 0;
            signatureEl.classList.remove("show");
            stopTyping();
        }
        startTyping(true);
        playSongFrom80();
        document.getElementById("infoStatus").innerHTML = "🎵 گۆرانی لە 1:20 دەستی پێکرد + پەیام هۆڵ دەبێت 🎵";
    });
    
    document.getElementById("resetBtn").addEventListener("click", () => {
        stopTyping();
        typedDiv.innerHTML = "";
        currentIdx = 0;
        signatureEl.classList.remove("show");
        document.getElementById("infoStatus").innerHTML = "پەیام ڕێسێت کرا. دووبارە کلیک لە دەستپێکردن بکە.";
    });
    
    // دروستکردنی ئەستێرەکان
    function createStars() {
        const starsDiv = document.getElementById("starsContainer");
        for (let i = 0; i < 200; i++) {
            let star = document.createElement("div");
            star.classList.add("star");
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            star.style.width = (Math.random() * 3 + 1) + "px";
            star.style.height = star.style.width;
            star.style.animationDuration = (Math.random() * 2 + 1) + "s";
            star.style.animationDelay = (Math.random() * 3) + "s";
            starsDiv.appendChild(star);
        }
    }
    createStars();
</script>
</body>
</html>
