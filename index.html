<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لەدایک بوونت پیرۆز - دادە</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0020 0%, #2d0040 25%, #1a1a3e 50%, #2d1040 75%, #1a0020 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Noto Naskh Arabic', 'Segoe UI', Tahoma, sans-serif;
            overflow-x: hidden;
            position: relative;
            cursor: pointer;
        }

        /* ئۆڤەرلەی دەستپێکردن */
        .start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 0, 20, 0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            flex-direction: column;
            gap: 20px;
        }

        .start-button {
            background: linear-gradient(135deg, #ff69b4, #ff1493, #c71585, #db7093);
            background-size: 300% 300%;
            animation: pulse 2s infinite, buttonShine 3s ease-in-out infinite;
            color: white;
            border: 3px solid rgba(255, 182, 193, 0.6);
            padding: 28px 55px;
            font-size: 30px;
            font-family: 'Noto Naskh Arabic', sans-serif;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.6), 0 0 100px rgba(255, 20, 147, 0.3);
            transition: all 0.4s ease;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .start-button:hover {
            transform: scale(1.08);
            box-shadow: 0 0 70px rgba(255, 105, 180, 0.9), 0 0 130px rgba(255, 20, 147, 0.5);
            border-color: rgba(255, 192, 203, 0.9);
        }

        @keyframes buttonShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .start-hint {
            color: rgba(255, 182, 193, 0.8);
            font-size: 18px;
            font-family: 'Noto Naskh Arabic', sans-serif;
            animation: fadeHint 2s ease-in-out infinite;
        }

        @keyframes fadeHint {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        /* ئەنیمەیشنی ئەستێرەکان */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
            opacity: 0;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.3); }
            25% { opacity: 0.4; transform: scale(0.7); }
            50% { opacity: 1; transform: scale(1.3); }
            75% { opacity: 0.4; transform: scale(0.7); }
        }

        /* مانگ */
        .moon {
            position: fixed;
            top: 35px;
            right: 60px;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle at 55% 35%, #fff0f5, #ffc0cb, #ff69b4);
            border-radius: 50%;
            box-shadow: 0 0 70px rgba(255, 105, 180, 0.6), 0 0 140px rgba(255, 20, 147, 0.3);
            animation: moonGlow 4s ease-in-out infinite, moonFloat 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes moonGlow {
            0%, 100% { box-shadow: 0 0 70px rgba(255, 105, 180, 0.6), 0 0 140px rgba(255, 20, 147, 0.3); }
            50% { box-shadow: 0 0 100px rgba(255, 182, 193, 0.9), 0 0 180px rgba(255, 105, 180, 0.6); }
        }

        @keyframes moonFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        /* دڵەکان */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .heart {
            position: absolute;
            animation: floatUpHeart var(--float-duration) linear infinite;
            opacity: 0;
        }

        @keyframes floatUpHeart {
            0% {
                transform: translateY(105vh) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-15vh) scale(1.6) rotate(360deg);
                opacity: 0;
            }
        }

        /* کۆنتێنەری سەرەکی */
        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 850px;
            background: rgba(30, 0, 50, 0.5);
            border-radius: 35px;
            padding: 45px 35px;
            backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 105, 180, 0.3);
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.6), inset 0 0 60px rgba(255, 105, 180, 0.05);
            animation: containerGlow 5s ease-in-out infinite;
            margin: 20px;
        }

        @keyframes containerGlow {
            0%, 100% { border-color: rgba(255, 105, 180, 0.3); }
            50% { border-color: rgba(255, 105, 180, 0.6); }
        }

        /* ناونیشان */
        .title-section {
            text-align: center;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInDown 1.5s ease-out forwards;
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff69b4, #ffb6c1, #ff1493, #db7093);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 4s ease-in-out infinite;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* نامەکە */
        .message-container {
            text-align: right;
            direction: rtl;
            min-height: 300px;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 25px 30px;
            border-right: 4px solid rgba(255, 105, 180, 0.4);
        }

        .typed-text {
            font-size: 21px;
            color: #ffd6e8;
            line-height: 2.1;
            text-shadow: 0 0 12px rgba(255, 105, 180, 0.4);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 26px;
            background: #ff69b4;
            animation: blink 0.7s infinite;
            margin-right: 3px;
            vertical-align: middle;
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.7);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* جیاکەرەوە */
        .divider {
            width: 150px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff69b4, transparent);
            margin: 30px auto;
            border-radius: 50%;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards;
            animation-delay: 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; width: 0; }
            to { opacity: 1; width: 150px; }
        }

        /* تێکستی گەورەی کۆتایی */
        .big-text-container {
            margin-top: 40px;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .big-text-container.visible {
            opacity: 1;
            animation: fadeInUpBig 2s ease-out forwards;
        }

        @keyframes fadeInUpBig {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .big-text {
            font-size: 55px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff69b4, #ffb6c1, #ff1493, #db7093, #ffc0cb);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: goldShine 3s ease-in-out infinite;
            line-height: 1.6;
            letter-spacing: 3px;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.5));
        }

        @keyframes goldShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* دڵی کۆتایی */
        .final-heart {
            font-size: 60px;
            animation: heartBeat 1s ease-in-out infinite;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .final-heart.visible {
            opacity: 1;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.25); }
            60% { transform: scale(1); }
        }

        /* کێکی ڕۆژی لەدایکبوون */
        .cake-container {
            text-align: center;
            font-size: 80px;
            margin-bottom: 20px;
            animation: cakeBounce 2s ease-in-out infinite, fadeIn 1.5s ease-out forwards;
            filter: drop-shadow(0 0 30px rgba(255, 105, 180, 0.6));
        }

        @keyframes cakeBounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* پەڕەی گوڵاوی */
        .rose-petal {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: petalFall linear infinite;
        }

        @keyframes petalFall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0px); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(-100px); opacity: 0; }
        }

        /* باڵۆنەکان */
        .balloon {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: balloonFloat linear infinite;
            font-size: 40px;
        }

        @keyframes balloonFloat {
            0% { transform: translateY(110vh) translateX(0px) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-10vh) translateX(60px) rotate(20deg); opacity: 0; }
        }

        /* هۆشداری دەنگ */
        .sound-notice {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: rgba(255, 105, 180, 0.9);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-family: 'Noto Naskh Arabic', sans-serif;
            font-size: 16px;
            display: none;
            animation: slideDown 0.5s ease-out;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.5);
        }

        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .big-text {
                font-size: 38px;
            }
            .typed-text {
                font-size: 16px;
            }
            .main-container {
                padding: 25px 15px;
                margin: 10px;
            }
            .title {
                font-size: 26px;
            }
            .moon {
                width: 65px;
                height: 65px;
                top: 20px;
                right: 25px;
            }
            .start-button {
                font-size: 22px;
                padding: 20px 35px;
            }
            .cake-container {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- هۆشداری دەنگ -->
    <div class="sound-notice" id="soundNotice">
        🔊 تکایە دەنگی ئامێرەکەت بەرز کەرەوە
    </div>

    <!-- ئۆڤەرلەی دەستپێکردن -->
    <div class="start-overlay" id="startOverlay">
        <div style="font-size: 80px; animation: heartBeat 1.2s ease-in-out infinite;">🎂</div>
        <button class="start-button" id="startButton">
            ✨ بکلیکە بۆ دەستپێکردن ✨
        </button>
        <div class="start-hint">🎵 کلیک بکە و گۆرانیەکە دەستپێدەکات</div>
    </div>

    <!-- پلەیەری یوتوب (بە iframe) -->
    <div id="youtubePlayer" style="position: fixed; top: -9999px; left: -9999px; width: 1px; height: 1px; opacity: 0; pointer-events: none;"></div>

    <!-- ئەنیمەیشنی ئەستێرەکان -->
    <div class="stars" id="starsContainer"></div>

    <!-- مانگ -->
    <div class="moon"></div>

    <!-- دڵەکان -->
    <div class="hearts-container" id="heartsContainer"></div>

    <!-- پەڕەی گوڵاوی -->
    <div id="petalsContainer"></div>

    <!-- باڵۆنەکان -->
    <div id="balloonsContainer"></div>

    <!-- کۆنتێنەری سەرەکی -->
    <div class="main-container">
        <!-- کێک -->
        <div class="cake-container">🎂</div>

        <!-- ناونیشان -->
        <div class="title-section">
            <h1 class="title">🎉 ڕۆژی لەدایک بوونت پیرۆز 🎉</h1>
        </div>

        <!-- نامەکە -->
        <div class="message-container">
            <p class="typed-text" id="typedMessage"></p>
            <span class="cursor" id="cursor"></span>
        </div>

        <!-- جیاکەرەوە -->
        <div class="divider"></div>

        <!-- تێکستی گەورە -->
        <div class="big-text-container" id="bigTextContainer">
            <p class="big-text">Dle Mn</p>
        </div>

        <!-- دڵی کۆتایی -->
        <div class="final-heart" id="finalHeart">💖</div>
    </div>

    <script>
        // ڤیدیۆکە بە شێوەیەکی ڕاستەوخۆ لە یوتوبەوە
        const youtubeVideoId = "3i5T2mkQsHQ";
        const startTime = 80; // 1:20
        let playerReady = false;

        // دروستکردنی پلەیەر بە iframe
        function createYouTubePlayer() {
            const container = document.getElementById('youtubePlayer');
            
            // دروستکردنی iframe بە شێوەی داینامیک
            const iframe = document.createElement('iframe');
            iframe.setAttribute('id', 'ytPlayer');
            iframe.setAttribute('width', '1');
            iframe.setAttribute('height', '1');
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allow', 'autoplay; encrypted-media');
            iframe.setAttribute('allowfullscreen', '');
            
            // ئەم لینکە ڕێگە بە ئۆتۆپلەی دەدات
            const src = `https://www.youtube.com/embed/${youtubeVideoId}?autoplay=0&controls=0&showinfo=0&rel=0&loop=1&playlist=${youtubeVideoId}&mute=0&enablejsapi=1&origin=${window.location.origin}&start=${startTime}`;
            iframe.setAttribute('src', src);
            
            container.appendChild(iframe);
            
            // پێویستە چاوەڕێ بکەین تا iframe بار دەبێت
            iframe.addEventListener('load', function() {
                playerReady = true;
                console.log('✅ پلەیەری یوتوب ئامادەیە');
            });
            
            return iframe;
        }

        // فەنکشنی پلەی گۆرانی
        function playMusic() {
            const iframe = document.getElementById('ytPlayer');
            if (iframe) {
                // ناردنی کۆماندی پلەی بۆ iframe
                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                
                // زیادکردنی ڤۆڵیوم
                setTimeout(() => {
                    iframe.contentWindow.postMessage('{"event":"command","func":"setVolume","args":[60]}', '*');
                }, 1000);
                
                console.log('🎵 گۆرانی دەستپێدەکات...');
            }
        }

        function pauseMusic() {
            const iframe = document.getElementById('ytPlayer');
            if (iframe) {
                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
            }
        }

        // دەستپێکردنی ئەزموون
        function startExperience() {
            console.log('🚀 دەستپێکردن...');
            
            // لابردنی ئۆڤەرلە
            document.getElementById('startOverlay').style.display = 'none';
            
            // نیشاندانی هۆشداری دەنگ
            const notice = document.getElementById('soundNotice');
            notice.style.display = 'block';
            setTimeout(() => {
                notice.style.display = 'none';
            }, 4000);
            
            // دەستپێکردنی گۆرانی
            setTimeout(() => {
                playMusic();
            }, 500);
            
            // دەستپێکردنی ئەنیمەیشنەکان ئەگەر هێشتا نەبوون
            if (!window.animationsStarted) {
                startAllAnimations();
                window.animationsStarted = true;
            }
        }

        // نامەکە
        const fullMessage = `ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من\nیارەبی تەمەنت هەزار ساڵ بینتن\nخوا لۆمن و ئازیزانت بێلیت\nدلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا\nلۆت ببیتە خۆشی دڵخۆشی\nمیوانی هەمیشەیت بیت رۆحی من\nباشە کە هەیت لەژیانم\nدوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت\nخوشکە گەورەی من`;

        const typedTextElement = document.getElementById('typedMessage');
        const cursorElement = document.getElementById('cursor');
        const bigTextContainer = document.getElementById('bigTextContainer');
        const finalHeart = document.getElementById('finalHeart');

        let charIndex = 0;
        const typingSpeed = 65;

        function typeMessage() {
            if (charIndex < fullMessage.length) {
                const currentChar = fullMessage.charAt(charIndex);
                
                if (currentChar === '\n') {
                    typedTextElement.innerHTML += '<br>';
                } else {
                    typedTextElement.innerHTML += currentChar;
                }
                
                charIndex++;
                
                let delay = typingSpeed;
                if (currentChar === ' ' || currentChar === '\n') {
                    delay = typingSpeed + 35;
                } else if (currentChar === '.' || currentChar === '،' || currentChar === '؟') {
                    delay = typingSpeed + 180;
                }
                
                setTimeout(typeMessage, delay);
                
                typedTextElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                cursorElement.style.display = 'none';
                
                setTimeout(() => {
                    bigTextContainer.classList.add('visible');
                    setTimeout(() => {
                        finalHeart.classList.add('visible');
                    }, 800);
                }, 500);
            }
        }

        // دروستکردنی ئەستێرەکان
        function createStars() {
            const container = document.getElementById('starsContainer');
            const starCount = 140;
            const colors = ['#ffffff', '#ffb6c1', '#ffc0cb', '#ff69b4', '#fff0f5', '#ffd6e8'];

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 3.5 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.setProperty('--duration', (Math.random() * 4 + 2.5) + 's');
                star.style.animationDelay = Math.random() * 6 + 's';
                star.style.background = colors[Math.floor(Math.random() * colors.length)];
                container.appendChild(star);
            }
        }

        // دروستکردنی دڵەکان
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const hearts = ['❤️', '💕', '💖', '💗', '💝', '💘', '💓', '💞', '💟', '❣️', '🩷', '✨', '🌟', '💫', '🕊️', '💐', '🎀'];

            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('heart');
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 92 + '%';
                heart.style.setProperty('--float-duration', (Math.random() * 4 + 3.5) + 's');
                heart.style.fontSize = (Math.random() * 24 + 16) + 'px';
                container.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 5000);
            }, 250);
        }

        // دروستکردنی پەڕەی گوڵاوی
        function createPetals() {
            const container = document.getElementById('petalsContainer');
            const petals = ['🌸', '🌷', '💮', '🏵️', '🌺', '🌹', '🥀', '💐', '🪷', '🌿'];

            setInterval(() => {
                const petal = document.createElement('div');
                petal.classList.add('rose-petal');
                petal.textContent = petals[Math.floor(Math.random() * petals.length)];
                petal.style.left = Math.random() * 95 + '%';
                petal.style.top = '-5%';
                petal.style.fontSize = (Math.random() * 18 + 14) + 'px';
                petal.style.animationDuration = (Math.random() * 6 + 7) + 's';
                container.appendChild(petal);

                setTimeout(() => {
                    petal.remove();
                }, 10000);
            }, 400);
        }

        // دروستکردنی باڵۆنەکان
        function createBalloons() {
            const container = document.getElementById('balloonsContainer');
            const balloons = ['🎈', '🎈', '🎈', '🎀', '🎁', '🎊', '🎉', '✨'];

            setInterval(() => {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                balloon.textContent = balloons[Math.floor(Math.random() * balloons.length)];
                balloon.style.left = Math.random() * 90 + '%';
                balloon.style.animationDuration = (Math.random() * 5 + 6) + 's';
                container.appendChild(balloon);

                setTimeout(() => {
                    balloon.remove();
                }, 8000);
            }, 800);
        }

        // دەستپێکردنی هەموو ئەنیمەیشنەکان
        function startAllAnimations() {
            createStars();
            createHearts();
            createPetals();
            createBalloons();
            
            setTimeout(() => {
                typeMessage();
            }, 1200);
        }

        // سەرەتاکردن
        window.addEventListener('load', function() {
            // دروستکردنی پلەیەری یوتوب
            createYouTubePlayer();
            
            // کلیک لەسەر دوگمەی دەستپێکردن
            document.getElementById('startButton').addEventListener('click', function(e) {
                e.preventDefault();
                startExperience();
            });
            
            // هەروەها کلیک لە هەر شوێنێکی ئۆڤەرلەکە
            document.getElementById('startOverlay').addEventListener('click', function(e) {
                if (e.target === this || e.target.closest('.start-button')) {
                    startExperience();
                }
            });
        });
    </script>
</body>
</html>
