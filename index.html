<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>ڕۆژی لەدایکبوونت پیرۆز بیت | Dle Mn</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0a0a1a;
      font-family: 'Arial', 'Segoe UI', sans-serif;
    }
    
    /* ئاسمانی تاریک و ئەستێرەکان */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    /* کۆنتێنەری سەرەکی */
    .container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* شوێنی پەیامەکە */
    #message-box {
      background: rgba(10, 10, 30, 0.75);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 2.5rem 2rem;
      max-width: 700px;
      width: 85%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 80px rgba(180, 130, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
      margin-bottom: 2rem;
      pointer-events: auto;
    }

    #typed-text {
      color: #f3e8ff;
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      line-height: 2.1;
      font-weight: 500;
      min-height: 4em;
      text-shadow: 0 0 20px #c084fc, 0 0 40px #a855f7;
      letter-spacing: 1px;
      direction: rtl;
      unicode-bidi: embed;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ناوی گەورە لە کۆتایی */
    .signature {
      margin-top: 1.8rem;
      font-size: clamp(2.2rem, 7vw, 3.5rem);
      font-weight: bold;
      color: #facc15;
      text-shadow: 0 0 25px #eab308, 0 0 50px #fbbf24, 0 0 70px #f59e0b;
      background: linear-gradient(to right, #fde047, #fbbf24, #eab308);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
      direction: rtl;
      unicode-bidi: embed;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: auto;
    }

    .signature.show {
      opacity: 1;
    }

    /* دوگمەی کۆنترۆڵ (ئارەزوومەندانە) */
    .music-note {
      position: absolute;
      bottom: 25px;
      right: 25px;
      z-index: 20;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c4b5fd;
      font-size: 24px;
      border: 1px solid rgba(255,255,255,0.25);
      pointer-events: auto;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.5);
      transition: 0.3s;
    }
    .music-note:hover {
      background: rgba(80, 40, 120, 0.8);
      color: #facc15;
    }

    /* ئایکۆنی یوتوب بۆ ڕێنمایی */
    .yt-badge {
      position: absolute;
      bottom: 25px;
      left: 25px;
      z-index: 20;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      padding: 6px 16px;
      border-radius: 30px;
      color: #ff9999;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: auto;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .yt-badge span {
      color: white;
      margin: 0 4px;
    }
  </style>
</head>
<body>
  <!-- کانڤاسی ئەستێرەکان -->
  <canvas id="starsCanvas"></canvas>

  <!-- کۆنتێنەری سەرەکی -->
  <div class="container">
    <div id="message-box">
      <div id="typed-text"></div>
      <div id="final-name" class="signature">Dle Mn</div>
    </div>
  </div>

  <!-- ئایکۆنی یوتوب -->
  <div class="yt-badge">
    🎬 <span>🎵</span>
  </div>
  
  <!-- دوگمەی میوزیک (بۆ دووبارە ڕێکخستنەوە) -->
  <div class="music-note" id="musicToggle" title="کلیک بکە بۆ دەستپێکردنەوەی گۆرانی">♪</div>

  <!-- iframe یوتوب (شاراوە) -->
  <div id="youtube-player" style="position:absolute; width:0; height:0; opacity:0; pointer-events:none;"></div>

  <script>
    // ===================  ئەستێرەکانی باکگراوند ===================
    const canvas = document.getElementById('starsCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    let width, height;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
      initStars(140); // ژمارەی ئەستێرەکان
    }

    function initStars(count) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.random() * 2.3 + 0.7,
          brightness: Math.random() * 0.7 + 0.3,
          speed: Math.random() * 0.4 + 0.15,
          angle: Math.random() * Math.PI * 2
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, width, height);
      // ناوچەی ناوەڕاست کەمێک ڕووناکتر
      const gradient = ctx.createRadialGradient(width/2, height/2, 100, width/2, height/2, width*0.7);
      gradient.addColorStop(0, '#1e1b4b');
      gradient.addColorStop(0.7, '#0f0f23');
      gradient.addColorStop(1, '#050510');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);
      
      stars.forEach(star => {
        // جوڵەی ئەستێرەکان بە ئاراستەی هەڕەمەکی
        star.x += Math.cos(star.angle) * star.speed * 0.15;
        star.y += Math.sin(star.angle) * star.speed * 0.15;
        
        // ئەگەر لە سنوور دەرچوو بیگەڕێنەوە
        if (star.x < -10) star.x = width + 10;
        if (star.x > width + 10) star.x = -10;
        if (star.y < -10) star.y = height + 10;
        if (star.y > height + 10) star.y = -10;
        
        // درەوشانەوە
        const flicker = 0.5 + Math.sin(Date.now() * 0.002 + star.x) * 0.3 + Math.cos(Date.now() * 0.003 + star.y) * 0.3;
        const alpha = Math.min(1, star.brightness * flicker + 0.3);
        
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 240, 255, ${alpha})`;
        ctx.shadowColor = '#d8b4fe';
        ctx.shadowBlur = star.radius * 3.5;
        ctx.fill();
        
        // هەندێ ئەستێرە گەورەتر ڕووناکی زۆرتر
        if (star.radius > 1.6) {
          ctx.beginPath();
          ctx.arc(star.x, star.y, star.radius * 0.8, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255, 255, 255, ${alpha*1.2})`;
          ctx.shadowBlur = star.radius * 7;
          ctx.fill();
        }
      });
      ctx.shadowBlur = 0; // ریست کردنی شادۆ
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawStars();

    // ===================  یوتوب و گۆرانی ===================
    const YOUTUBE_VIDEO_ID = '3i5T2mkQsHQ';
    const START_TIME_SECONDS = 80; // 1:20 = 80 چرکە
    
    // بارکردنی API ی یوتوب
    let player;
    let playerReady = false;
    
    // دروستکردنی iframe بە شێوەی داینامیکی
    function loadYouTubeAPI() {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }
    
    // ئەم فەنکشنە لەلایەن API ی یوتوب بانگ دەکرێت
    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('youtube-player', {
        videoId: YOUTUBE_VIDEO_ID,
        playerVars: {
          autoplay: 1,            // خۆکارانە پەخش بکە
          controls: 0,            // کۆنترۆڵەکان نیشان نەدات
          modestbranding: 1,
          loop: 0,
          rel: 0,
          showinfo: 0,
          start: START_TIME_SECONDS, // لە 1:20 دەست پێبکات
          mute: 0,                // بێ دەنگ نەبێت (دەنگی هەیە)
          enablejsapi: 1,
          playsinline: 1
        },
        events: {
          'onReady': onPlayerReady,
          'onError': onPlayerError
        }
      });
    };
    
    function onPlayerReady(event) {
      playerReady = true;
      console.log('✅ یوتوب پلەیەر ئامادەیە، لە 1:20 دەست پێدەکات.');
      // دڵنیابوون لە دەستپێکردن لە شوێنی دروست
      event.target.seekTo(START_TIME_SECONDS);
      event.target.playVideo();
      // هەندێک جار پێویستە دووبارە ئەنپەیوز بکرێت
      setTimeout(() => {
        if (player && player.getPlayerState() !== 1) {
          player.playVideo();
        }
      }, 800);
    }
    
    function onPlayerError(error) {
      console.warn('⚠️ هەڵەیەک لە یوتوب ڕوویدا. کۆد:', error.data);
      // هەوڵدانەوە بۆ دووبارە بارکردن
      document.getElementById('musicToggle').style.background = '#552244';
    }
    
    // دوگمەی میوزیک بۆ هاوکاتکردنەوە
    document.getElementById('musicToggle').addEventListener('click', () => {
      if (player && playerReady) {
        const currentTime = player.getCurrentTime();
        if (currentTime < START_TIME_SECONDS - 1 || currentTime > START_TIME_SECONDS + 120) {
          player.seekTo(START_TIME_SECONDS);
        }
        player.playVideo();
        // کاریگەری بینراو
        const btn = document.getElementById('musicToggle');
        btn.style.transform = 'scale(1.2)';
        setTimeout(() => { btn.style.transform = 'scale(1)'; }, 200);
      } else {
        alert('🔄 چاوەڕێ بکە... پلەیەر ئامادە دەبێت.');
      }
    });
    
    // دەستپێکردنی API
    loadYouTubeAPI();

    // ===================  پەیامی پیت بە پیت ===================
    const messageText = "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من یارەبی تەمەنت هەزار ساڵ بینتن خوا لۆمن و ئازیزانت بێلیت دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا لۆت ببیتە خۆشی دڵخۆشی میوانی هەمیشەیت بیت رۆحی من باشە کە هەیت لەژیانم دوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت خوشکە گەورەی من";
    
    const typedTextElement = document.getElementById('typed-text');
    const finalNameElement = document.getElementById('final-name');
    let charIndex = 0;
    let typingInterval;
    
    function startTyping() {
      typedTextElement.textContent = '';
      charIndex = 0;
      finalNameElement.classList.remove('show');
      
      if (typingInterval) clearInterval(typingInterval);
      
      typingInterval = setInterval(() => {
        if (charIndex < messageText.length) {
          // زیادکردنی پیتی داهاتوو
          typedTextElement.textContent += messageText.charAt(charIndex);
          charIndex++;
        } else {
          // پەیام تەواو بوو
          clearInterval(typingInterval);
          // نیشاندانی ناوی گەورە
          setTimeout(() => {
            finalNameElement.classList.add('show');
          }, 400);
        }
      }, 90); // خێرایی نوسین 90ms بۆ هەر پیتێک
    }
    
    // دەستپێکردنی نوسین دوای ئەوەی پەیج بار کرا و پلەیەر ئامادەبوو
    window.addEventListener('load', () => {
      // کەمێک دواخستن بۆ ئەوەی یوتوب بار بێت
      setTimeout(() => {
        startTyping();
      }, 1200);
    });
    
    // ئەگەر پلەیەر زۆر درەنگ ئامادەبوو، هێشتا نوسین دەست پێبکات
    setTimeout(() => {
      if (typedTextElement.textContent === '' || typedTextElement.textContent.length < 5) {
        startTyping();
      }
    }, 2500);

    // ===================  ڕێکخستنی ئۆتۆماتیکی دەنگ ===================
    // زۆرێک لە وێبگەڕەکان پێویستیان بە کارلێکی بەکارهێنەر هەیە بۆ دەنگ
    document.body.addEventListener('click', function initAudio() {
      if (player && playerReady) {
        player.unMute();
        player.setVolume(80);
        // دڵنیابوون لە پەخش
        if (player.getPlayerState() !== 1) {
          player.seekTo(START_TIME_SECONDS);
          player.playVideo();
        }
      }
    }, { once: false });
    
    // هەروەها بۆ مۆبایل
    document.body.addEventListener('touchstart', function touchAudio() {
      if (player && playerReady) {
        player.unMute();
        player.setVolume(80);
        if (player.getPlayerState() !== 1) {
          player.seekTo(START_TIME_SECONDS);
          player.playVideo();
        }
      }
    }, { once: false });
    
    console.log('🌟 هەموو شتێک ئامادەیە: پەیامی لەدایکبوون، ئاسمانی ئەستێرەیی، گۆرانی لە 1:20');
  </script>
</body>
</html>
