<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لەدایک بوونت پیرۆز بیت</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at bottom, #0d1b2a 0%, #000000 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Noto Naskh Arabic', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            animation-delay: var(--delay);
            opacity: 0.7;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.8);
                box-shadow: 0 0 15px 5px rgba(255, 255, 255, 0.8);
            }
        }

        .moon {
            position: fixed;
            top: 8%;
            right: 12%;
            width: 120px;
            height: 120px;
            pointer-events: none;
            z-index: 1;
            animation: moonGlow 4s ease-in-out infinite;
        }

        .moon-circle {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 35% 35%, #fff8dc, #f5e6b8);
            border-radius: 50%;
            box-shadow: 0 0 60px 25px rgba(255, 248, 220, 0.6), 0 0 120px 50px rgba(255, 248, 220, 0.3);
            position: relative;
        }

        .moon-crater1 {
            position: absolute;
            width: 25px;
            height: 25px;
            background: rgba(210, 180, 140, 0.5);
            border-radius: 50%;
            top: 30%;
            left: 40%;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }
        .moon-crater2 {
            position: absolute;
            width: 15px;
            height: 15px;
            background: rgba(210, 180, 140, 0.5);
            border-radius: 50%;
            top: 55%;
            left: 25%;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }
        .moon-crater3 {
            position: absolute;
            width: 18px;
            height: 18px;
            background: rgba(210, 180, 140, 0.5);
            border-radius: 50%;
            top: 45%;
            left: 60%;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.3);
        }

        @keyframes moonGlow {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(255, 248, 220, 0.7));
            }
            50% {
                filter: drop-shadow(0 0 60px rgba(255, 248, 220, 1));
            }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 50px;
            max-width: 700px;
            width: 90%;
            text-align: center;
            border: 2px solid rgba(255, 248, 220, 0.3);
            box-shadow: 0 0 60px rgba(255, 248, 220, 0.2), inset 0 0 30px rgba(0,0,0,0.8);
            animation: fadeInUp 2s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message {
            color: #fff8dc;
            font-size: 1.5rem;
            line-height: 2.2;
            text-shadow: 0 0 15px rgba(255, 248, 220, 0.5);
            word-spacing: 4px;
            margin-bottom: 25px;
            white-space: pre-line;
        }

        .message span {
            display: inline-block;
            animation: wordAppear 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes wordAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signature {
            color: #ffd700;
            font-size: 3.5rem;
            font-weight: 700;
            text-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5);
            letter-spacing: 8px;
            margin-top: 20px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                text-shadow: 0 0 25px rgba(255, 215, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 50px rgba(255, 215, 0, 1), 0 0 100px rgba(255, 215, 0, 0.9), 0 0 150px rgba(255, 215, 0, 0.6);
            }
        }

        .falling-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px white;
            animation: shoot var(--travel-duration) linear infinite;
            animation-delay: var(--travel-delay);
            opacity: 0;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
            right: 100%;
        }

        @keyframes shoot {
            0% {
                transform: translate(0, 0) rotate(-25deg);
                opacity: 0;
            }
            5% {
                opacity: 1;
            }
            15% {
                transform: translate(-400px, 250px) rotate(-25deg);
                opacity: 0;
            }
            100% {
                transform: translate(-400px, 250px) rotate(-25deg);
                opacity: 0;
            }
        }

        @media (max-width: 600px) {
            .content-wrapper {
                padding: 25px 20px;
            }
            .message {
                font-size: 1.1rem;
                line-height: 2;
            }
            .signature {
                font-size: 2.5rem;
            }
            .moon {
                width: 80px;
                height: 80px;
                top: 4%;
                right: 8%;
            }
            .moon-circle {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>

    <div class="moon">
        <div class="moon-circle">
            <div class="moon-crater1"></div>
            <div class="moon-crater2"></div>
            <div class="moon-crater3"></div>
        </div>
    </div>

    <div class="falling-stars" id="fallingStars"></div>

    <div class="content-wrapper" id="contentBox">
        <div class="message" id="birthdayMessage"></div>
        <div class="signature">Dle Mn</div>
    </div>

    <div id="youtubePlayer" style="display:none;"></div>

    <script>
        // Create twinkling stars
        function createStars() {
            const container = document.getElementById('starsContainer');
            const starCount = 200;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.setProperty('--duration', `${Math.random() * 3 + 2}s`);
                star.style.setProperty('--delay', `${Math.random() * 5}s`);
                container.appendChild(star);
            }
        }

        // Create shooting stars
        function createShootingStars() {
            const container = document.getElementById('fallingStars');
            for (let i = 0; i < 4; i++) {
                const shooter = document.createElement('div');
                shooter.classList.add('shooting-star');
                shooter.style.left = `${Math.random() * 80 + 10}%`;
                shooter.style.top = `${Math.random() * 40}%`;
                shooter.style.setProperty('--travel-duration', `${Math.random() * 3 + 4}s`);
                shooter.style.setProperty('--travel-delay', `${Math.random() * 8}s`);
                container.appendChild(shooter);
            }
        }

        // Animate message word by word
        function animateMessage() {
            const messageDiv = document.getElementById('birthdayMessage');
            const fullMessage = `ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من
یارەبی تەمەنت هەزار ساڵ بینتن
خوا لۆمن و ئازیزانت بێلیت
دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا لۆت ببیتە خۆشی
دڵخۆشی میوانی هەمیشەیت بیت ڕۆحی من
باشە کە هەیت لەژیانم
دوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت
خوشکە گەورەی من`;

            const words = fullMessage.split(/\s+/);
            messageDiv.innerHTML = '';

            words.forEach((word, index) => {
                const span = document.createElement('span');
                span.textContent = word + ' ';
                span.style.animationDelay = `${index * 0.2}s`;
                messageDiv.appendChild(span);
            });
        }

        // Load YouTube Iframe API and start from 1:20
        function setupYouTubePlayer() {
            const tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            const firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            window.onYouTubeIframeAPIReady = function() {
                window.player = new YT.Player('youtubePlayer', {
                    height: '0',
                    width: '0',
                    videoId: '3i5T2mkQsHQ',
                    playerVars: {
                        'autoplay': 0,
                        'controls': 0,
                        'start': 80, // 1:20 = 80 seconds
                        'loop': 1,
                        'playlist': '3i5T2mkQsHQ'
                    },
                    events: {
                        'onReady': onPlayerReady
                    }
                });
            };

            function onPlayerReady(event) {
                // Player is ready but we need user interaction to autoplay
                console.log("YouTube player ready. Click anywhere to start music from 1:20.");
            }
        }

        // Start music on first user interaction
        function enableAutoplayOnInteraction() {
            const body = document.body;
            let started = false;

            function startMusic() {
                if (!started && window.player && window.player.playVideo) {
                    window.player.playVideo();
                    window.player.seekTo(80, true); // Ensure it starts at 1:20
                    started = true;
                    body.removeEventListener('click', startMusic);
                    body.removeEventListener('touchstart', startMusic);
                    body.removeEventListener('keydown', startMusic);
                    console.log("Music started from 1:20");
                }
            }

            body.addEventListener('click', startMusic);
            body.addEventListener('touchstart', startMusic);
            body.addEventListener('keydown', startMusic);
        }

        // Initialize everything
        window.addEventListener('DOMContentLoaded', () => {
            createStars();
            createShootingStars();
            animateMessage();
            setupYouTubePlayer();
            enableAutoplayOnInteraction();
        });

        // Add a subtle hint for user to click
        const style = document.createElement('style');
        style.textContent = `
            body::after {
                content: '🌟 کلیک بکە بۆ دەستپێکردنی موزیک 🌟';
                position: fixed;
                bottom: 25px;
                left: 50%;
                transform: translateX(-50%);
                color: rgba(255,248,220,0.7);
                font-family: 'Noto Naskh Arabic', serif;
                font-size: 0.9rem;
                z-index: 20;
                pointer-events: none;
                animation: hintPulse 2s ease-in-out infinite;
            }
            @keyframes hintPulse {
                0%, 100% { opacity: 0.4; }
                50% { opacity: 0.9; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
