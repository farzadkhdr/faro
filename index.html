<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ڕۆژی لەدایک بوونت پیرۆز بیت</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Naskh Arabic', serif;
            overflow: hidden;
            position: relative;
        }

        /* Background particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .birthday-text {
            color: white;
            font-size: 28px;
            line-height: 2;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .word {
            display: inline-block;
            opacity: 0;
            animation: wordAppear 0.5s ease-out forwards;
            margin: 0 5px;
        }

        @keyframes wordAppear {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .final-text {
            color: #FFD700;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
            margin-top: 40px;
            animation: glowText 2s infinite alternate;
            opacity: 0;
        }

        .final-text.show {
            animation: glowAppear 1s ease-out forwards, glowText 2s infinite alternate;
        }

        @keyframes glowAppear {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes glowText {
            0% {
                text-shadow: 2px 2px 8px rgba(255, 215, 0, 0.5);
            }
            100% {
                text-shadow: 2px 2px 20px rgba(255, 215, 0, 0.9), 0 0 30px rgba(255, 215, 0, 0.7);
            }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .music-control:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .emoji {
            font-size: 50px;
            animation: bounce 1s infinite;
            margin: 20px;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="emoji">🎂🎉🎈</div>
        <div class="birthday-text" id="birthdayText"></div>
        <div class="final-text" id="finalText">Dle Mn</div>
    </div>

    <button class="music-control" id="musicControl" onclick="toggleMusic()">
        🔊 گۆرانی
    </button>

    <script>
        // Create particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 5 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                container.appendChild(particle);
            }
        }

        // Kurdish birthday message
        const message = "ڕۆژی لە دایک بوونت پیرۆز بیت دادەی من یارەبی تەمەنت هەزار ساڵ بینتن خوا لۆمن و ئازیزانت بێلیت دلی من هەر نەخۆشیەکت دیتبیت لەو ساڵەدا لۆت ببیتە خۆشی دڵخۆشی میوانی هەمیشەیت بیت رۆحی من باشە کە هەیت لەژیانم دوبارەو هەزار جار ڕۆژی لەدایک بوونت پیرۆز بیت خوشکە گەورەی من";
        
        const words = message.split(' ');

        // YouTube player setup
        let player;
        let isPlaying = false;
        const youtubeUrl = "https://m.youtube.com/watch?v=3i5T2mkQsHQ&list=RD3i5T2mkQsHQ&start_radio=1";

        // Load YouTube API
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: '3i5T2mkQsHQ',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'start': 80, // Start at 1:20 (80 seconds)
                    'loop': 1
                },
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // Player is ready
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                player.seekTo(80);
                player.playVideo();
            }
        }

        function toggleMusic() {
            if (isPlaying) {
                player.pauseVideo();
                document.getElementById('musicControl').innerHTML = '🔊 گۆرانی';
            } else {
                player.playVideo();
                document.getElementById('musicControl').innerHTML = '🔇 بێدەنگ';
            }
            isPlaying = !isPlaying;
        }

        // Word by word animation
        function animateWords() {
            const textContainer = document.getElementById('birthdayText');
            let currentIndex = 0;
            let currentLine = document.createElement('div');
            currentLine.style.marginBottom = '10px';
            textContainer.appendChild(currentLine);

            function showNextWord() {
                if (currentIndex < words.length) {
                    const wordSpan = document.createElement('span');
                    wordSpan.classList.add('word');
                    wordSpan.textContent = words[currentIndex] + ' ';
                    currentLine.appendChild(wordSpan);
                    
                    // Create new line every 8 words
                    if ((currentIndex + 1) % 8 === 0 && currentIndex < words.length - 1) {
                        currentLine = document.createElement('div');
                        currentLine.style.marginBottom = '10px';
                        textContainer.appendChild(currentLine);
                    }
                    
                    currentIndex++;
                    setTimeout(showNextWord, 400); // 0.4 second delay between words
                } else {
                    // Show final text after all words
                    setTimeout(() => {
                        const finalText = document.getElementById('finalText');
                        finalText.classList.add('show');
                    }, 1000);
                }
            }

            showNextWord();
        }

        // Initialize everything
        window.onload = function() {
            createParticles();
            
            // Create hidden YouTube player
            const playerDiv = document.createElement('div');
            playerDiv.id = 'player';
            playerDiv.style.display = 'none';
            document.body.appendChild(playerDiv);
            
            // Start word animation
            animateWords();
            
            // Auto-play music after user interaction
            document.addEventListener('click', function initAudio() {
                if (player && !isPlaying) {
                    player.playVideo();
                    isPlaying = true;
                    document.getElementById('musicControl').innerHTML = '🔇 بێدەنگ';
                }
                document.removeEventListener('click', initAudio);
            }, { once: false });
        };
    </script>
</body>
</html>
